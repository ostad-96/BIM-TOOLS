<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIM Tools — UI Kit</title>

<!-- Live product CSS (single source of truth for the corporate refresh) -->
<link rel="stylesheet" href="../../shared/css/acc-variables.css">
<link rel="stylesheet" href="../../shared/css/acc-base.css">
<link rel="stylesheet" href="../../shared/css/acc-components.css">
<link rel="stylesheet" href="../../shared/css/acc-corporate.css">
<link rel="stylesheet" href="../../colors_and_type.css">

<style>
    /* The UI kit demo lives inside a single <body class="corp"> so the
       corporate styles take effect end-to-end. */
    html, body { background: var(--c-paper); min-height: 100vh; }
    /* Make the login screen full viewport when it's the active route. */
    .auth-stage { min-height: 100vh; }
    /* Sidebar inside the click-thru: cap to viewport-minus-topbar */
    .app-shell .app-side { top: 60px; height: calc(100vh - 60px); }

    /* Demo banner — only visible inside the UI kit */
    .kit-banner {
        position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
        background: rgba(14, 23, 25, 0.85);
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 11.5px;
        padding: 7px 14px;
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        z-index: 9999;
        backdrop-filter: blur(8px);
        letter-spacing: 0.02em;
    }
    .kit-banner b { color: #fff; font-weight: 600; }
    .kit-banner .kbd { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; background: rgba(255,255,255,0.16); padding: 1px 6px; border-radius: 4px; margin: 0 2px; }

    /* ────────────────────────────────────────────────────────────────
       Hub feature strip — these styles live in the product's
       inline <style> block, NOT in shared/css/. Mirrored here so the
       UI kit renders the gradient greeting correctly. Keep in sync
       with the source rules in BIM-TOOLS/index.html.
       ──────────────────────────────────────────────────────────── */
    .hub-feature-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        background: linear-gradient(135deg, var(--c-brand-dark) 0%, var(--c-brand) 100%);
        color: #fff;
        border-radius: var(--r-lg);
        padding: 22px 24px;
        margin-bottom: 28px;
        position: relative; overflow: hidden;
    }
    .hub-feature-strip::after {
        content: ''; position: absolute; right: -100px; top: -100px;
        width: 320px; height: 320px;
        background: radial-gradient(circle, rgba(255,255,255,0.10) 0%, transparent 70%);
        pointer-events: none;
    }
    .hub-feature-l { grid-column: 1 / -1; margin-bottom: 4px; position: relative; z-index: 1; }
    .hub-feature-l .ey {
        font-size: 11px; font-weight: 600;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: rgba(255,255,255,0.6);
        margin-bottom: 6px;
    }
    .hub-feature-l .ti {
        font-family: var(--f-display);
        font-size: 22px; font-weight: 600;
        letter-spacing: -0.012em;
        text-wrap: balance;
        max-width: 540px;
    }
    .hub-feature-stat {
        position: relative; z-index: 1;
        padding-right: 14px;
    }
    .hub-feature-stat .v {
        font-family: var(--f-display);
        font-size: 26px; font-weight: 600;
        letter-spacing: -0.018em;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        margin-bottom: 4px;
    }
    .hub-feature-stat .k {
        font-size: 11px; font-weight: 500;
        color: rgba(255,255,255,0.66);
        text-transform: uppercase; letter-spacing: 0.06em;
    }
    @media (max-width: 640px) {
        .hub-feature-strip { padding: 18px; }
        .hub-feature-l .ti { font-size: 18px; }
        .hub-feature-stat .v { font-size: 22px; }
    }

    /* ────────────────────────────────────────────────────────────────
       Login — centered card on a textured brand canvas. Mirrors
       preview/components-auth.html. Floating labels + disabled-until-
       typed primary button via :has() / :placeholder-shown.
       ──────────────────────────────────────────────────────────── */
    .login-stage {
        min-height: 100vh;
        background:
            linear-gradient(160deg, #002834 0%, #003B4D 100%);
        position: relative; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
    }
    .login-stage::before {
        content: '';
        position: absolute; inset: 0;
        background-image:
            radial-gradient(circle at 20% 18%, rgba(255,255,255,0.06) 0%, transparent 45%),
            radial-gradient(circle at 86% 92%, rgba(180,83,9,0.10) 0%, transparent 50%),
            linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: auto, auto, 32px 32px, 32px 32px;
        pointer-events: none;
    }
    .login-shell {
        position: relative; z-index: 1;
        width: 360px; max-width: 100%;
        background: #ffffff;
        border-radius: 14px;
        padding: 30px 34px 26px;
        box-shadow:
            0 24px 60px rgba(0,0,0,0.34),
            0 4px 12px rgba(0,0,0,0.18),
            0 0 0 1px rgba(255,255,255,0.04);
        animation: loginIn .5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    }
    @keyframes loginIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .login-brand {
        display: flex; align-items: center; gap: 12px;
        padding-bottom: 18px; margin-bottom: 22px;
        border-bottom: 1px solid #f0eee7;
    }
    .login-brand .mk {
        width: 38px; height: 38px;
        background: #000; border-radius: 0;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden; flex-shrink: 0;
    }
    .login-brand .mk img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .login-brand .nm {
        font-family: var(--f-display); font-weight: 600; font-size: 14px;
        color: var(--c-ink); letter-spacing: -0.005em; line-height: 1.2;
    }
    .login-brand .nm .sub {
        display: block;
        font-size: 10.5px; font-weight: 500;
        text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--c-ink-4); margin-top: 3px;
    }

    .login-shell .f-row { margin-bottom: 12px; }
    .login-shell .fl { position: relative; width: 100%; }
    .login-shell .fl .input {
        width: 100%; box-sizing: border-box;
        height: 52px;
        padding: 18px 14px 6px;
        background: #fbfbf8;
        border: 1px solid var(--c-line);
        border-radius: 8px;
        font-family: var(--f-body); font-size: 14px; color: var(--c-ink);
        line-height: 1.2;
        transition:
            border-color .15s var(--ease),
            background .15s var(--ease),
            box-shadow .15s var(--ease);
    }
    .login-shell .fl .input:hover { border-color: var(--c-line-strong); }
    .login-shell .fl .input:focus {
        outline: none;
        background: #fff;
        border-color: var(--c-brand);
        box-shadow: var(--el-glow);
    }
    .login-shell .fl .lbl {
        position: absolute; left: 12px; top: 50%;
        transform: translateY(-50%);
        padding: 0 4px;
        background: transparent;
        color: var(--c-ink-4);
        font-family: var(--f-body);
        font-size: 14px; font-weight: 400;
        pointer-events: none;
        transition:
            top .15s var(--ease),
            font-size .15s var(--ease),
            color .15s var(--ease);
    }
    .login-shell .fl .input:focus + .lbl,
    .login-shell .fl .input:not(:placeholder-shown) + .lbl {
        top: 8px; transform: none;
        font-size: 11px; font-weight: 500;
        color: var(--c-ink-3);
    }
    .login-shell .fl .input:focus + .lbl { color: var(--c-brand); }

    /* Submit — disabled-until-Benutzername-has-content (pure CSS) */
    .login-shell .login-btn {
        width: 100%;
        background: #d0cec6;
        color: rgba(255, 255, 255, 0.9);
        border: 0;
        padding: 13px 14px;
        border-radius: 8px;
        font-family: var(--f-body); font-weight: 600; font-size: 13.5px;
        cursor: not-allowed;
        margin-top: 4px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition:
            background .28s var(--ease),
            color .28s var(--ease),
            transform .12s var(--ease);
    }
    .login-shell .login-btn svg {
        width: 14px; height: 14px;
        opacity: 0.7;
        transition: opacity .28s var(--ease), transform .28s var(--ease);
    }
    .login-shell:has(.usr-input:not(:placeholder-shown)) .login-btn {
        background: var(--c-brand); color: #fff; cursor: pointer;
    }
    .login-shell:has(.usr-input:not(:placeholder-shown)) .login-btn svg { opacity: 1; transform: translateX(2px); }
    .login-shell:has(.usr-input:not(:placeholder-shown)) .login-btn:hover { background: var(--c-brand-dark); }
    .login-shell:has(.usr-input:not(:placeholder-shown)) .login-btn:hover svg { transform: translateX(4px); }
    .login-shell:has(.usr-input:not(:placeholder-shown)) .login-btn:active { transform: translateY(1px); }

    .login-forgot {
        display: block; text-align: center;
        margin-top: 14px;
        font-size: 11.5px; color: var(--c-ink-3); text-decoration: none;
    }
    .login-forgot:hover { color: var(--c-brand); text-decoration: underline; }

    .login-foot {
        position: relative; z-index: 1;
        margin-top: 18px; text-align: center;
        font-family: var(--f-mono);
        font-size: 10.5px; letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.45);
    }
    .login-foot .sep { margin: 0 6px; opacity: 0.5; }
    .login-err {
        font-size: 12px; color: var(--c-danger);
        background: var(--c-danger-soft);
        border: 1px solid #f1d1d1;
        padding: 8px 12px; border-radius: 6px;
        margin-bottom: 12px;
        animation: errShake .35s ease;
    }
    @keyframes errShake { 0%,100% { transform: none; } 25%,75% { transform: translateX(-4px); } 50% { transform: translateX(4px); } }
</style>
</head>

<body class="corp">

<div id="root"></div>

<div class="kit-banner">
    UI Kit · BIM Tools <b>Recreation</b> — start at the <b>Login</b>, click through to the hub, modules, series &amp; admin
</div>
