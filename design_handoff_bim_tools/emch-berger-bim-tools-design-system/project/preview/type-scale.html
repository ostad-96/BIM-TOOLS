<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 20px 26px; }
.row { display: grid; grid-template-columns: 50px 1fr 90px; gap: 14px; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--c-line); }
.row:last-child { border-bottom: 0; }
.k { font-family: var(--f-mono); font-size: 10.5px; color: var(--c-ink-4); }
.sample { font-family: 'Inter Tight', sans-serif; color: var(--c-ink); letter-spacing: -0.005em; }
.sample.b { font-family: 'Inter', sans-serif; font-weight: 400; letter-spacing: 0; }
.tk { font-family: var(--f-mono); font-size: 10.5px; color: var(--c-ink-4); text-align: right; }
</style></head><body>
<div class="card">
    <div class="row"><div class="k">30 px</div><div class="sample" style="font-size:30px; font-weight:600;">Page Hero</div><div class="tk">t-4xl · 600</div></div>
    <div class="row"><div class="k">24 px</div><div class="sample" style="font-size:24px; font-weight:600;">Modal Title</div><div class="tk">t-3xl · 600</div></div>
    <div class="row"><div class="k">18 px</div><div class="sample" style="font-size:18px; font-weight:600;">Section Header</div><div class="tk">t-xl · 600</div></div>
    <div class="row"><div class="k">16 px</div><div class="sample b" style="font-size:16px; font-weight:600;">Module Tile Label</div><div class="tk">t-lg · 600</div></div>
    <div class="row"><div class="k">14 px</div><div class="sample b" style="font-size:14px; font-weight:600;">Card title / Button</div><div class="tk">t-md · 500/600</div></div>
    <div class="row"><div class="k">13 px</div><div class="sample b" style="font-size:13px;">Body default — paragraphs &amp; rows</div><div class="tk">t-base · 400</div></div>
    <div class="row"><div class="k">11 px</div><div class="sample b" style="font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color: var(--c-ink-3); font-weight:600;">Eyebrow / Table header</div><div class="tk">t-xs · 600</div></div>
</div>
</body></html>
