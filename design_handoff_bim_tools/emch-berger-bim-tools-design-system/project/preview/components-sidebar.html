<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; }
.shell { display: grid; grid-template-columns: 220px 1fr; min-height: 240px; }
.side { background: #fff; border-right: 1px solid #e6e3dc; padding: 18px 12px; display: flex; flex-direction: column; gap: 2px; }
.brand { display: flex; align-items: center; gap: 10px; padding: 6px 8px 16px; border-bottom: 1px solid #e6e3dc; margin-bottom: 12px; }
.brand .mk { width: 38px; height: 38px; background: #000; border-radius: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.brand .mk img { width: 100%; height: 100%; object-fit: cover; display: block; }
.brand .nm { font-family: 'Inter Tight'; font-weight: 600; font-size: 13px; color: #0e1719; }
.brand .sb { font-size: 10px; color: #8a939a; text-transform: uppercase; letter-spacing: 0.08em; }
.link { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; color: #364046; font-size: 13px; font-weight: 500; text-decoration: none; }
.link:hover { background: #f2f5f6; color: #0e1719; }
.link.active { background: #003B4D; color: #fff; box-shadow: 0 1px 2px rgba(14,23,25,0.05); }
.link svg { width: 16px; height: 16px; }
.main { background: #fafaf7; padding: 18px 22px; font-size: 12px; color: #8a939a; }
.main .h2 { font-family: 'Inter Tight'; color: #0e1719; font-size: 18px; font-weight: 600; margin: 0 0 6px; }
</style></head><body>
<div class="card">
    <div class="shell">
        <aside class="side">
            <div class="brand"><div class="mk"><img src="../assets/emch-berger-logo.gif" alt="Emch+Berger"></div><div><div class="nm">BIM Tools</div><div class="sb">Admin</div></div></div>
            <a class="link active" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-7H10v7H5a2 2 0 0 1-2-2z"/></svg>Übersicht</a>
            <a class="link" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21v-1a7 7 0 0 1 14 0v1"/></svg>Benutzer</a>
            <a class="link" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>Aktivitäten</a>
            <a class="link" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Zugriffsrechte</a>
        </aside>
        <div class="main">
            <h2 class="h2">Benutzerverwaltung</h2>
            <div>Erstellen, bearbeiten und deaktivieren · Rollenvergabe · Passwort zurücksetzen</div>
        </div>
    </div>
</div>
</body></html>
