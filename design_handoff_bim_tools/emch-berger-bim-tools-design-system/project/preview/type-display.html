<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 28px 28px 22px; }
.eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #b45309; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.eyebrow::before { content: ''; display: inline-block; width: 16px; height: 1px; background: #b45309; }
.h1 { font-family: 'Inter Tight', sans-serif; font-size: 32px; font-weight: 600; line-height: 1.05; letter-spacing: -0.018em; color: var(--c-ink); margin: 0; text-wrap: balance; }
.tag { display: inline-block; margin-top: 14px; font-family: var(--f-mono); font-size: 11px; color: var(--c-ink-4); }
</style></head><body>
<div class="card">
    <div class="eyebrow">Display · Inter Tight 600</div>
    <h1 class="h1">Ein zentraler Ort für jedes Bauprojekt</h1>
    <div class="tag">font-family: 'Inter Tight'  ·  weight 600  ·  size 30–32px  ·  tracking -0.018em  ·  text-wrap: balance</div>
</div>
</body></html>
