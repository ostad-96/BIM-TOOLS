<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 0; background: #fafaf7; }
.top { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 14px 22px; background: rgba(255,255,255,0.92); backdrop-filter: blur(14px); border-bottom: 1px solid #e6e3dc; min-height: 60px; }
.brand { display: flex; align-items: center; gap: 12px; }
.mark { width: 38px; height: 38px; background: #000; border-radius: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.mark img { width: 100%; height: 100%; object-fit: cover; display: block; }
.name { font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 15px; color: #0e1719; }
.sub { font-size: 11px; color: #8a939a; text-transform: uppercase; letter-spacing: 0.08em; }
.crumbs { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5d676e; }
.crumbs a { color: #5d676e; padding: 4px 8px; border-radius: 5px; text-decoration: none; }
.crumbs .sep { color: #d0cec6; }
.crumbs .here { color: #0e1719; font-weight: 500; }
.right { display: flex; align-items: center; gap: 8px; }
.chip { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 6px; background: #fff; border: 1px solid #e6e3dc; border-radius: 999px; font-size: 13px; font-weight: 500; color: #0e1719; }
.av { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #003B4D 0%, #00576f 100%); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Inter Tight'; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #7c3aed; }
.icon-btn { width: 34px; height: 34px; border-radius: 8px; background: #fff; border: 1px solid #e6e3dc; color: #364046; display: inline-flex; align-items: center; justify-content: center; }
.icon-btn svg { width: 16px; height: 16px; }
</style></head><body>
<div class="card">
    <header class="top">
        <div class="brand">
            <div class="mark"><img src="../assets/emch-berger-logo.gif"></div>
            <div>
                <div class="name">BIM Tools</div>
                <div class="sub">Bauprojekt-Koordination</div>
            </div>
        </div>
        <nav class="crumbs">
            <a href="#">Startseite</a><span class="sep">/</span><span class="here">Sitzungsprotokolle</span>
        </nav>
        <div class="right">
            <button class="chip"><span class="av">AH</span><span>Andrea Huber</span><span class="dot" title="Admin"></span></button>
            <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </div>
    </header>
</div>
</body></html>
