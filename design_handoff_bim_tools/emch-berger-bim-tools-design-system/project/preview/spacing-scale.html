<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 26px; }
.h { font-family: var(--f-display); font-weight: 600; font-size: 13px; margin-bottom: 14px; }
.row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
.tag { width: 38px; font-family: var(--f-mono); font-size: 11px; color: var(--c-ink-3); }
.bar { background: #003B4D; height: 14px; border-radius: 2px; }
.px { font-family: var(--f-mono); font-size: 10.5px; color: var(--c-ink-4); }
</style></head><body>
<div class="card">
    <div class="h">Spacing — 4 px base scale</div>
    <div class="row"><div class="tag">s-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
    <div class="row"><div class="tag">s-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
    <div class="row"><div class="tag">s-3</div><div class="bar" style="width:12px"></div><div class="px">12 px · grid gaps</div></div>
    <div class="row"><div class="tag">s-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
    <div class="row"><div class="tag">s-5</div><div class="bar" style="width:20px"></div><div class="px">20 px</div></div>
    <div class="row"><div class="tag">s-6</div><div class="bar" style="width:24px"></div><div class="px">24 px · page padding</div></div>
    <div class="row"><div class="tag">s-7</div><div class="bar" style="width:28px"></div><div class="px">28 px · page top padding</div></div>
    <div class="row"><div class="tag">s-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
</div>
</body></html>
