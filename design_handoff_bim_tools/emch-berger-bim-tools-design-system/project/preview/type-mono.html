<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 28px; }
.eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #b45309; margin-bottom: 10px; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--c-ink); font-variant-numeric: tabular-nums; }
.mono span.muted { color: var(--c-ink-4); }
.row { display: flex; gap: 24px; margin-top: 8px; }
.col { display: flex; flex-direction: column; gap: 4px; }
.col .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--c-ink-4); font-weight: 600; }
.col .v { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--c-ink); font-variant-numeric: tabular-nums; }
.tag { margin-top: 14px; font-family: var(--f-mono); font-size: 11px; color: var(--c-ink-4); }
</style></head><body>
<div class="card">
    <div class="eyebrow">Mono · JetBrains Mono 400</div>
    <div class="mono">SR-2026-014 <span class="muted">·</span> instanceId: b3f7‑2a08 <span class="muted">·</span> v1.4.2</div>
    <div class="row">
        <div class="col"><div class="k">Serien</div><div class="v">128</div></div>
        <div class="col"><div class="k">Sitzungen</div><div class="v">1 042</div></div>
        <div class="col"><div class="k">Offen</div><div class="v">37</div></div>
        <div class="col"><div class="k">Heute</div><div class="v">13. Mai</div></div>
    </div>
    <div class="tag">font-family: 'JetBrains Mono'  ·  size 12 px  ·  font-variant-numeric: tabular-nums  ·  IDs, codes, timestamps, table numbers</div>
</div>
</body></html>
