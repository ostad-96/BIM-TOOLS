<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.card { padding: 22px 26px; display: flex; flex-direction: column; gap: 14px; }
.h { font-family: var(--f-display); font-weight: 600; font-size: 13px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 14px; min-height: 36px; background: #fff; color: #0e1719; border: 1px solid #e6e3dc; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; line-height: 1; }
.btn svg { width: 15px; height: 15px; }
.btn-primary { background: #003B4D; color: #fff; border-color: #003B4D; }
.btn-ghost { background: transparent; border-color: transparent; color: #364046; }
.btn-danger { background: #9b1c1c; color: #fff; border-color: #9b1c1c; }
.btn-sm { padding: 6px 10px; font-size: 12px; min-height: 30px; }
.btn-lg { padding: 11px 20px; font-size: 14px; min-height: 44px; font-weight: 600; }
.lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--c-ink-4); min-width: 64px; }
.icon-btn { width: 34px; height: 34px; border-radius: 8px; background: #fff; border: 1px solid #e6e3dc; color: #364046; display: inline-flex; align-items: center; justify-content: center; }
.icon-btn svg { width: 16px; height: 16px; }
</style></head><body>
<div class="card">
    <div class="h">Buttons</div>
    <div class="row">
        <div class="lbl">Primary</div>
        <button class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Neue Serie
        </button>
        <button class="btn">Sekundär</button>
        <button class="btn btn-ghost">Ghost</button>
        <button class="btn btn-danger">Löschen</button>
    </div>
    <div class="row">
        <div class="lbl">Sizes</div>
        <button class="btn btn-sm">Small · btn-sm</button>
        <button class="btn">Default · 36 px</button>
        <button class="btn btn-primary btn-lg">Large · btn-lg</button>
    </div>
    <div class="row">
        <div class="lbl">Icon</div>
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
        <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></button>
    </div>
</div>
</body></html>
