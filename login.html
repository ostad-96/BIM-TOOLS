<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden — ACC</title>
<link rel="stylesheet" href="shared/css/acc-variables.css">
<link rel="stylesheet" href="shared/css/acc-base.css">
<link rel="stylesheet" href="shared/css/acc-components.css">
<style>
body { background: var(--acc-primary); overflow: hidden; }

.login-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
}
.login-bg canvas { width: 100%; height: 100%; }

.login-center {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
}

.login-card {
    width: 380px; background: var(--acc-white);
    border-radius: var(--acc-radius-xl);
    box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
    animation: cardIn 0.5s ease-out;
}

@keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-header {
    padding: 32px 32px 24px;
    text-align: center;
}
.login-logo {
    width: 72px; height: 72px; margin: 0 auto 16px;
    border-radius: var(--acc-radius-md);
    box-shadow: var(--acc-shadow-md);
    overflow: hidden;
}
.login-logo img { width: 100%; height: 100%; object-fit: cover; }

.login-title {
    font-size: 18px; font-weight: 700; color: var(--acc-text);
    letter-spacing: -0.3px;
}
.login-subtitle {
    font-size: 12px; color: var(--acc-text-muted); margin-top: 4px;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 500;
}

.login-body {
    padding: 0 32px 32px;
}

.login-field {
    margin-bottom: 16px;
}
.login-field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--acc-text-secondary); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
}
.login-field input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--acc-border); border-radius: var(--acc-radius-md);
    font-size: 14px; color: var(--acc-text);
    background: var(--acc-gray-50);
    transition: all var(--acc-transition-fast);
}
.login-field input:focus {
    outline: none; border-color: var(--acc-primary);
    box-shadow: 0 0 0 3px rgba(0,59,77,0.1);
    background: var(--acc-white);
}
.login-field input::placeholder { color: var(--acc-text-muted); }

.login-btn {
    width: 100%; padding: 11px 20px;
    background: var(--acc-primary); color: var(--acc-text-inverse);
    border: none; border-radius: var(--acc-radius-md);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all var(--acc-transition-fast);
    margin-top: 8px;
}
.login-btn:hover:not(:disabled) { background: var(--acc-primary-light); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.login-error {
    display: none; padding: 8px 12px;
    background: var(--acc-danger-light); color: var(--acc-danger);
    border-radius: var(--acc-radius-md); font-size: 12px; font-weight: 500;
    margin-bottom: 12px; text-align: center;
}
.login-error.visible { display: block; animation: shake 0.4s ease; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
}

.login-footer {
    padding: 14px 32px;
    background: var(--acc-gray-50);
    border-top: 1px solid var(--acc-border);
    text-align: center;
    font-size: 10px; color: var(--acc-text-muted);
    letter-spacing: 0.3px;
}
</style>
</head>
<body>

<div class="login-bg">
    <canvas id="c"></canvas>
</div>

<div class="login-center">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <img src="shared/assets/emch-berger-logo.gif" alt="Emch+Berger">
            </div>
            <div class="login-title">Bauprojekt-Koordination</div>
            <div class="login-subtitle">ACC Platform</div>
        </div>

        <div class="login-body">
            <div id="loginError" class="login-error"></div>

            <div class="login-field">
                <label for="username">Benutzername</label>
                <input type="text" id="username" placeholder="Benutzername eingeben" autocomplete="username" autofocus>
            </div>

            <div class="login-field">
                <label for="password">Passwort</label>
                <input type="password" id="password" placeholder="Passwort eingeben" autocomplete="current-password">
            </div>

            <button class="login-btn" id="loginBtn" onclick="doLogin()">Anmelden</button>
        </div>

        <div class="login-footer">
            &copy; 2026 Emch+Berger GmbH &middot; ACC Platform v1.0
        </div>
    </div>
</div>

<script src="shared/js/acc-utils.js"></script>
<script src="shared/js/acc-storage.js"></script>
<script src="shared/js/acc-storage-indexeddb.js?v=3"></script>
<script src="shared/js/acc-auth.js"></script>
<script>
// ── Canvas animation ──
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

var nodes = [];
for (var i = 0; i < 80; i++) {
    nodes.push({
        x: Math.random()*2000, y: Math.random()*1200,
        vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
        r: Math.random()*1.8+0.6, pulse: Math.random()*Math.PI*2
    });
}
function draw(t) {
    ctx.clearRect(0,0,W,H);
    for (var i = 0; i < nodes.length; i++) {
        var n = nodes[i];
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
        for (var j = i+1; j < nodes.length; j++) {
            var m = nodes[j], dx = n.x-m.x, dy = n.y-m.y, dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < 140) {
                ctx.beginPath(); ctx.moveTo(n.x,n.y); ctx.lineTo(m.x,m.y);
                ctx.strokeStyle='rgba(255,255,255,'+(0.12*(1-dist/140))+')'; ctx.stroke();
            }
        }
        var pr = n.r + Math.sin(t/1000+n.pulse)*0.5;
        ctx.beginPath(); ctx.arc(n.x,n.y,pr,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
    }
    requestAnimationFrame(draw);
}
draw(0);

// ── Auth init ──
var db = new ACC.IndexedDBProvider('acc-platform');
ACC.StorageManager.init(db).then(function() {
    return ACC.Auth.init();
}).then(function() {
    // If already logged in, redirect to hub
    return ACC.Auth.checkAlreadyLoggedIn('index.html');
});

// ── Login ──
function doLogin() {
    var btn = document.getElementById('loginBtn');
    var errEl = document.getElementById('loginError');
    var user = document.getElementById('username').value.trim();
    var pass = document.getElementById('password').value;

    if (!user || !pass) {
        showError('Bitte Benutzername und Passwort eingeben.');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Anmelden...';
    errEl.classList.remove('visible');

    ACC.Auth.login(user, pass).then(function() {
        window.location.href = 'index.html';
    }).catch(function(err) {
        showError(err.message || 'Anmeldung fehlgeschlagen.');
        btn.disabled = false;
        btn.textContent = 'Anmelden';
    });
}

function showError(msg) {
    var el = document.getElementById('loginError');
    el.textContent = msg;
    el.classList.remove('visible');
    void el.offsetWidth; // force reflow for re-animation
    el.classList.add('visible');
}

// Enter key
document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('password').focus();
});
</script>
</body>
</html>
