<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benutzer — BIM Tools Admin</title>
<link rel="stylesheet" href="../../shared/css/acc-variables.css">
<link rel="stylesheet" href="../../shared/css/acc-base.css">
<link rel="stylesheet" href="../../shared/css/acc-components.css">
<link rel="stylesheet" href="../../shared/css/acc-corporate.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="corp" style="opacity:0">

<main class="app-page">
    <div class="page-hero">
        <div class="page-hero-l">
            <div class="page-hero-eyebrow">Benutzerverwaltung</div>
            <h1 class="page-hero-title">Benutzer</h1>
            <p class="page-hero-desc">Benutzer anlegen, Rollen vergeben, Passwort zurücksetzen oder Konten deaktivieren.</p>
        </div>
        <div class="page-hero-r">
            <button class="btn btn-primary" onclick="showAddModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Neuer Benutzer
            </button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrap" style="width:280px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            <input type="text" id="searchInput" class="input" placeholder="Benutzer suchen …" oninput="renderUsers()">
        </div>
        <select id="roleFilter" class="select" style="width:180px;" onchange="renderUsers()">
            <option value="">Alle Rollen</option>
            <option value="admin">Administrator</option>
            <option value="editor">Bearbeiter</option>
            <option value="viewer">Betrachter</option>
        </select>
    </div>

    <div id="usersTable"></div>
</main>

<!-- Add/Edit Modal (no password field — users set their own on first login) -->
<div class="bim-modal-overlay" id="userModal">
    <div class="bim-modal" style="max-width:480px;">
        <div class="bim-modal-header">
            <h3 id="modalTitle">Neuer Benutzer</h3>
            <button class="bim-btn-icon" onclick="closeModal()">&times;</button>
        </div>
        <div class="bim-modal-body">
            <input type="hidden" id="mUserId">
            <div class="bim-form-group">
                <label class="bim-form-label">Name *</label>
                <input type="text" id="mName" class="bim-input" placeholder="Vollständiger Name">
            </div>
            <div class="bim-form-group">
                <label class="bim-form-label">Benutzername *</label>
                <input type="text" id="mUsername" class="bim-input" placeholder="Anmeldename">
            </div>
            <div class="bim-form-group">
                <label class="bim-form-label">E-Mail</label>
                <input type="email" id="mEmail" class="bim-input" placeholder="E-Mail-Adresse">
            </div>
            <div class="bim-form-group">
                <label class="bim-form-label">Firma</label>
                <input type="text" id="mCompany" class="bim-input" placeholder="Firma">
            </div>
            <div class="bim-form-group">
                <label class="bim-form-label">Rolle *</label>
                <select id="mRole" class="bim-select">
                    <option value="viewer">Betrachter</option>
                    <option value="editor">Bearbeiter</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            <div id="newUserHint" style="display:none; font-size:11px; color:var(--bim-text-muted); background:var(--bim-gray-50); padding:8px 12px; border-radius:var(--bim-radius-md); margin-top:4px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="vertical-align:-2px;margin-right:4px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                Der Benutzer wird bei der ersten Anmeldung aufgefordert, ein eigenes Passwort zu erstellen.
            </div>
        </div>
        <div class="bim-modal-footer">
            <button class="bim-btn bim-btn-secondary" onclick="closeModal()">Abbrechen</button>
            <button class="bim-btn bim-btn-primary" onclick="saveUser()">Speichern</button>
        </div>
    </div>
</div>

<script src="../../shared/js/acc-utils.js"></script>
<script src="../../shared/js/acc-storage.js"></script>
<script src="../../shared/js/acc-storage-indexeddb.js?v=3"></script>
<script src="../../shared/js/acc-storage-json.js"></script>
<script src="../../shared/js/crypto-polyfill.js"></script>
<script src="../../shared/js/acc-auth.js"></script>
<script src="../../shared/js/acc-ui.js"></script>
<script>
var currentUser = null;
var allUsers = [];

async function init() {
    await BIM.StorageManager.init(new BIM.AutoStorageProvider());
    await BIM.Auth.init();
    currentUser = await BIM.Auth.requireAuth('../../login.html');
    if (!currentUser) return;
    if (!BIM.Auth.canAccessAdmin(currentUser)) { window.location.href = '../../index.html'; return; }
    document.body.style.opacity = '1';

    BIM.UI.installTopBar({
        crumbs: [
            { label: 'BIM Tools', href: '../../index.html' },
            { label: 'Administration', href: 'index.html' },
            { label: 'Benutzer', here: true }
        ],
        user: currentUser,
        loginHref: '../../login.html',
        brandHref: '../../index.html',
        subtitle: 'Administration'
    });
    BIM.UI.installAdminSubnav('users');

    await loadUsers();
}

async function loadUsers() {
    allUsers = await BIM.Auth.getAllUsers();
    renderUsers();
}

function renderUsers() {
    var search = (document.getElementById('searchInput').value || '').toLowerCase();
    var roleFilter = document.getElementById('roleFilter').value;
    var filtered = allUsers.filter(function(u) {
        if (roleFilter && u.role !== roleFilter) return false;
        if (search) {
            var h = (u.name + ' ' + u.username + ' ' + u.email + ' ' + u.company).toLowerCase();
            if (h.indexOf(search) === -1) return false;
        }
        return true;
    });

    var html = '<table class="bim-table"><thead><tr>' +
        '<th>Name</th><th>Benutzername</th><th>E-Mail</th><th>Firma</th>' +
        '<th>Rolle</th><th>Status</th><th>Letzte Aktivität</th><th style="width:140px;"></th>' +
        '</tr></thead><tbody>';

    if (filtered.length === 0) {
        html += '<tr><td colspan="8" style="text-align:center;color:var(--bim-text-muted);padding:30px;">Keine Benutzer gefunden</td></tr>';
    }

    filtered.forEach(function(u) {
        var roleClass = 'role-badge role-badge-' + u.role;
        var statusDot = u.status === 'active' ? 'status-dot-active' : 'status-dot-inactive';

        // Must-set-password indicator
        var pwIndicator = '';
        if (u.mustSetPassword || u.passwordHash === null) {
            pwIndicator = '<span style="font-size:11px; color:var(--bim-warning, #f59e0b); margin-left:6px; cursor:help;" title="Passwort noch nicht gesetzt">&#9888;</span>';
        }

        // Lockout indicator
        var lockIndicator = '';
        if (u.lockedUntil && new Date(u.lockedUntil) > new Date()) {
            lockIndicator = '<span style="font-size:11px; color:var(--bim-danger, #e53e3e); margin-left:4px; cursor:help;" title="Konto gesperrt">&#128274;</span>';
        }

        html += '<tr>' +
            '<td><strong>' + BIM.Utils.escapeHtml(u.name || '—') + '</strong>' + pwIndicator + lockIndicator + '</td>' +
            '<td>' + BIM.Utils.escapeHtml(u.username) + '</td>' +
            '<td>' + BIM.Utils.escapeHtml(u.email || '—') + '</td>' +
            '<td>' + BIM.Utils.escapeHtml(u.company || '—') + '</td>' +
            '<td><span class="' + roleClass + '">' + BIM.Auth.getRoleLabel(u.role) + '</span></td>' +
            '<td><span class="status-dot ' + statusDot + '"></span>' + (u.status === 'active' ? 'Aktiv' : 'Inaktiv') + '</td>' +
            '<td style="font-size:11px;color:var(--bim-text-muted);">' + (u.lastActivity ? BIM.Utils.formatDateTime(u.lastActivity) : '—') + '</td>' +
            '<td style="text-align:right;">' +
                '<button class="bim-btn-icon bim-btn-sm" onclick="editUser(\'' + u.id + '\')" title="Bearbeiten" style="margin-right:4px;">&#9998;</button>' +
                '<button class="bim-btn-icon bim-btn-sm" onclick="resetPassword(\'' + u.id + '\')" title="Passwort zurücksetzen" style="margin-right:4px;">&#128273;</button>' +
                (u.status === 'active'
                    ? '<button class="bim-btn-icon bim-btn-sm" onclick="toggleStatus(\'' + u.id + '\', false)" title="Deaktivieren" style="margin-right:4px;">&#10006;</button>'
                    : '<button class="bim-btn-icon bim-btn-sm" onclick="toggleStatus(\'' + u.id + '\', true)" title="Aktivieren" style="color:var(--bim-success);margin-right:4px;">&#10004;</button>') +
                (u.id !== currentUser.id ? '<button class="bim-btn-icon bim-btn-sm" onclick="deleteUser(\'' + u.id + '\')" title="Endgültig löschen" style="color:var(--bim-danger, #e53e3e);">&#128465;</button>' : '') +
            '</td></tr>';
    });

    html += '</tbody></table>';
    document.getElementById('usersTable').innerHTML = html;
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = 'Neuer Benutzer';
    document.getElementById('mUserId').value = '';
    document.getElementById('mName').value = '';
    document.getElementById('mUsername').value = '';
    document.getElementById('mEmail').value = '';
    document.getElementById('mCompany').value = '';
    document.getElementById('mRole').value = 'viewer';
    document.getElementById('mUsername').disabled = false;
    document.getElementById('newUserHint').style.display = 'block';
    document.getElementById('userModal').classList.add('active');
}

function editUser(id) {
    var u = allUsers.find(function(x) { return x.id === id; });
    if (!u) return;
    document.getElementById('modalTitle').textContent = 'Benutzer bearbeiten';
    document.getElementById('mUserId').value = u.id;
    document.getElementById('mName').value = u.name || '';
    document.getElementById('mUsername').value = u.username;
    document.getElementById('mEmail').value = u.email || '';
    document.getElementById('mCompany').value = u.company || '';
    document.getElementById('mRole').value = u.role;
    document.getElementById('mUsername').disabled = true;
    document.getElementById('newUserHint').style.display = 'none';
    document.getElementById('userModal').classList.add('active');
}

function closeModal() { document.getElementById('userModal').classList.remove('active'); }

async function saveUser() {
    var id = document.getElementById('mUserId').value;
    var name = document.getElementById('mName').value.trim();
    var username = document.getElementById('mUsername').value.trim();
    var email = document.getElementById('mEmail').value.trim();
    var company = document.getElementById('mCompany').value.trim();
    var role = document.getElementById('mRole').value;

    if (!name || !username) { BIM.UI.error('Name und Benutzername sind Pflichtfelder.'); return; }

    try {
        if (id) {
            // Edit existing
            var user = allUsers.find(function(x) { return x.id === id; });
            if (!user) return;
            user.name = name;
            user.email = email;
            user.company = company;
            user.role = role;
            await BIM.Auth.updateUser(user);
            BIM.Auth.logActivity(currentUser.id, currentUser.name, 'update', 'user', user.id, user.name, 'Benutzer bearbeitet');
            BIM.UI.success('Benutzer aktualisiert');
        } else {
            // Create new (no password — user sets own on first login)
            var newUser = await BIM.Auth.createUser({
                name: name, username: username,
                email: email, company: company, role: role
            });
            BIM.Auth.logActivity(currentUser.id, currentUser.name, 'create', 'user', newUser.id, newUser.name, 'Benutzer erstellt');
            BIM.UI.success('Benutzer erstellt. Passwort wird bei Erstanmeldung gesetzt.');
        }
        closeModal();
        await loadUsers();
    } catch (e) {
        BIM.UI.error(e.message || 'Fehler beim Speichern');
    }
}

// ── Admin Password Reset (forces user to set new password on next login) ──

async function resetPassword(id) {
    var u = allUsers.find(function(x) { return x.id === id; });
    if (!u) return;

    var confirmed = await BIM.UI.confirm(
        'Passwort zurücksetzen',
        'Das Passwort von "' + (u.name || u.username) + '" wird zurückgesetzt. Der Benutzer muss bei der nächsten Anmeldung ein neues Passwort erstellen.'
    );
    if (!confirmed) return;

    try {
        await BIM.Auth.adminResetPassword(u.id);
        BIM.Auth.logActivity(currentUser.id, currentUser.name, 'update', 'user', id, u.name || u.username, 'Passwort zurückgesetzt');
        BIM.UI.success('Passwort zurückgesetzt. Benutzer muss neues Passwort erstellen.');
        await loadUsers();
    } catch (e) {
        BIM.UI.error(e.message || 'Fehler beim Zurücksetzen');
    }
}

async function toggleStatus(id, activate) {
    try {
        if (activate) {
            await BIM.Auth.activateUser(id);
        } else {
            if (id === currentUser.id) { BIM.UI.error('Sie können Ihr eigenes Konto nicht deaktivieren.'); return; }
            await BIM.Auth.deactivateUser(id);
        }
        var u = allUsers.find(function(x) { return x.id === id; });
        BIM.Auth.logActivity(currentUser.id, currentUser.name, 'update', 'user', id, u ? u.name : '', activate ? 'Aktiviert' : 'Deaktiviert');
        BIM.UI.success(activate ? 'Benutzer aktiviert' : 'Benutzer deaktiviert');
        await loadUsers();
    } catch (e) { BIM.UI.error(e.message); }
}

async function deleteUser(id) {
    var u = allUsers.find(function(x) { return x.id === id; });
    if (!u) return;
    if (id === currentUser.id) { BIM.UI.error('Sie können Ihr eigenes Konto nicht löschen.'); return; }

    var confirmed = await BIM.UI.confirm(
        'Benutzer endgültig löschen',
        'Der Benutzer "' + BIM.Utils.escapeHtml(u.name || u.username) + '" wird unwiderruflich aus der Datenbank gelöscht. Diese Aktion kann nicht rückgängig gemacht werden.'
    );
    if (!confirmed) return;

    try {
        // Remove all sessions for this user
        var sessions = await BIM.StorageManager.query('sessions', { userId: id });
        for (var i = 0; i < sessions.length; i++) {
            await BIM.StorageManager.remove('sessions', sessions[i].id);
        }
        // Remove all activity logs for this user
        var logs = await BIM.StorageManager.query('activityLogs', { userId: id });
        for (var i = 0; i < logs.length; i++) {
            await BIM.StorageManager.remove('activityLogs', logs[i].id);
        }
        // Remove user profile
        await BIM.StorageManager.remove('userProfiles', id);
        BIM.Auth.logActivity(currentUser.id, currentUser.name, 'delete', 'user', id, u.name || u.username, 'Benutzer endgültig gelöscht');
        BIM.UI.success('Benutzer "' + (u.name || u.username) + '" wurde gelöscht.');
        await loadUsers();
    } catch (e) {
        BIM.UI.error(e.message || 'Fehler beim Löschen');
    }
}

init();
</script>
</body>
</html>
