<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktivitäten — BIM Tools Admin</title>
<link rel="stylesheet" href="../../shared/css/acc-variables.css">
<link rel="stylesheet" href="../../shared/css/acc-base.css">
<link rel="stylesheet" href="../../shared/css/acc-components.css">
<link rel="stylesheet" href="../../shared/css/acc-corporate.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="corp" style="opacity:0">

<main class="app-page">
    <div class="page-hero">
        <div class="page-hero-l">
            <div class="page-hero-eyebrow">Audit Trail</div>
            <h1 class="page-hero-title">Aktivitäten</h1>
            <p class="page-hero-desc">Vollständiges Protokoll aller Benutzeraktionen — filtern nach Zeitraum, Benutzer und Aktion.</p>
        </div>
        <div class="page-hero-r">
            <button class="btn" onclick="exportCSV()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                CSV Export
            </button>
        </div>
    </div>

    <div class="toolbar">
        <div class="search-wrap" style="width:240px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            <input type="text" id="searchInput" class="input" placeholder="Suchen …" oninput="renderLogs()">
        </div>
        <select id="actionFilter" class="select" style="width:160px;" onchange="renderLogs()">
            <option value="">Alle Aktionen</option>
            <option value="login">Anmeldung</option>
            <option value="logout">Abmeldung</option>
            <option value="view">Ansicht</option>
            <option value="create">Erstellt</option>
            <option value="update">Aktualisiert</option>
            <option value="delete">Gelöscht</option>
        </select>
        <select id="userFilter" class="select" style="width:200px;" onchange="renderLogs()">
            <option value="">Alle Benutzer</option>
        </select>
        <input type="date" id="dateFrom" class="input" style="width:160px;" onchange="renderLogs()">
        <span class="muted" style="font-size:12px;">bis</span>
        <input type="date" id="dateTo" class="input" style="width:160px;" onchange="renderLogs()">
        <span id="logCount" class="count"></span>
    </div>

    <div id="logsTable"></div>
</main>

<script src="../../shared/js/acc-utils.js"></script>
<script src="../../shared/js/acc-storage.js"></script>
<script src="../../shared/js/acc-storage-indexeddb.js?v=3"></script>
<script src="../../shared/js/acc-storage-json.js"></script>
<script src="../../shared/js/crypto-polyfill.js"></script>
<script src="../../shared/js/acc-auth.js"></script>
<script src="../../shared/js/acc-ui.js"></script>
<script>
var currentUser = null;
var allLogs = [];

async function init() {
    await BIM.StorageManager.init(new BIM.AutoStorageProvider());
    await BIM.Auth.init();
    currentUser = await BIM.Auth.requireAuth('../../login.html');
    if (!currentUser) return;
    if (!BIM.Auth.canAccessAdmin(currentUser)) { window.location.href = '../../index.html'; return; }
    document.body.style.opacity = '1';

    BIM.UI.installTopBar({
        crumbs: [
            { label: 'BIM Tools', href: '../../index.html' },
            { label: 'Administration', href: 'index.html' },
            { label: 'Aktivitäten', here: true }
        ],
        user: currentUser, loginHref: '../../login.html', brandHref: '../../index.html', subtitle: 'Administration'
    });
    BIM.UI.installAdminSubnav('activity');

    // Populate user filter
    var users = await BIM.Auth.getAllUsers();
    var sel = document.getElementById('userFilter');
    users.forEach(function(u) {
        sel.innerHTML += '<option value="' + u.id + '">' + BIM.Utils.escapeHtml(u.name || u.username) + '</option>';
    });

    await loadLogs();
}

async function loadLogs() {
    allLogs = await BIM.Auth.getActivityLogs();
    allLogs.sort(function(a,b) { return a.timestamp > b.timestamp ? -1 : 1; });
    renderLogs();
}

function getFiltered() {
    var search = (document.getElementById('searchInput').value || '').toLowerCase();
    var action = document.getElementById('actionFilter').value;
    var userId = document.getElementById('userFilter').value;
    var from = document.getElementById('dateFrom').value;
    var to = document.getElementById('dateTo').value;

    return allLogs.filter(function(l) {
        if (action && l.action !== action) return false;
        if (userId && l.userId !== userId) return false;
        if (from && l.timestamp && l.timestamp.slice(0,10) < from) return false;
        if (to && l.timestamp && l.timestamp.slice(0,10) > to) return false;
        if (search) {
            var h = (l.userName + ' ' + l.action + ' ' + l.resourceName + ' ' + l.details + ' ' + l.resourceType).toLowerCase();
            if (h.indexOf(search) === -1) return false;
        }
        return true;
    });
}

function renderLogs() {
    var filtered = getFiltered();
    document.getElementById('logCount').textContent = filtered.length + ' von ' + allLogs.length + ' Einträge';

    var html = '<table class="bim-table bim-table-compact"><thead><tr>' +
        '<th style="width:160px;">Zeitstempel</th>' +
        '<th>Benutzer</th>' +
        '<th style="width:110px;">Aktion</th>' +
        '<th>Ressource</th>' +
        '<th>Details</th>' +
        '</tr></thead><tbody>';

    if (filtered.length === 0) {
        html += '<tr><td colspan="5" style="text-align:center;color:var(--bim-text-muted);padding:30px;">Keine Einträge gefunden</td></tr>';
    }

    var limit = Math.min(filtered.length, 500);
    for (var i = 0; i < limit; i++) {
        var l = filtered[i];
        var actionCls = 'bim-badge ';
        if (l.action === 'login' || l.action === 'create') actionCls += 'bim-badge-aktiv';
        else if (l.action === 'delete') actionCls += 'bim-badge-entwurf';
        else if (l.action === 'update') actionCls += 'bim-badge-in_bearbeitung';
        else actionCls += 'bim-badge-type';

        html += '<tr>' +
            '<td style="font-size:11px;color:var(--bim-text-muted);white-space:nowrap;">' + (l.timestamp ? BIM.Utils.formatDateTime(l.timestamp) : '—') + '</td>' +
            '<td><strong>' + BIM.Utils.escapeHtml(l.userName || '—') + '</strong></td>' +
            '<td><span class="' + actionCls + '">' + actionLabel(l.action) + '</span></td>' +
            '<td>' + BIM.Utils.escapeHtml(l.resourceName || '—') + '<span style="font-size:10px;color:var(--bim-text-muted);margin-left:4px;">' + BIM.Utils.escapeHtml(l.resourceType || '') + '</span></td>' +
            '<td style="font-size:11px;color:var(--bim-text-muted);">' + BIM.Utils.escapeHtml(l.details || '') + '</td>' +
        '</tr>';
    }
    if (filtered.length > 500) {
        html += '<tr><td colspan="5" style="text-align:center;color:var(--bim-text-muted);padding:12px;font-size:11px;">Zeige 500 von ' + filtered.length + ' Einträgen</td></tr>';
    }

    html += '</tbody></table>';
    document.getElementById('logsTable').innerHTML = html;
}

function actionLabel(a) {
    var map = { login:'Anmeldung', logout:'Abmeldung', view:'Ansicht', create:'Erstellt', update:'Aktualisiert', delete:'Gelöscht' };
    return map[a] || a;
}

function exportCSV() {
    var filtered = getFiltered();
    var csv = 'Zeitstempel;Benutzer;Aktion;Ressourcentyp;Ressource;Details\n';
    filtered.forEach(function(l) {
        csv += [
            l.timestamp || '', l.userName || '', l.action || '',
            l.resourceType || '', l.resourceName || '', l.details || ''
        ].map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(';') + '\n';
    });

    var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'aktivitaetsprotokoll_' + BIM.Utils.today() + '.csv';
    a.click();
    URL.revokeObjectURL(url);
    BIM.UI.success('CSV exportiert');
}

init();
</script>
</body>
</html>
