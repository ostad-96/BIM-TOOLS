<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zugriff — BIM Tools Admin</title>
<link rel="stylesheet" href="../../shared/css/acc-variables.css">
<link rel="stylesheet" href="../../shared/css/acc-base.css">
<link rel="stylesheet" href="../../shared/css/acc-components.css">
<link rel="stylesheet" href="../../shared/css/acc-corporate.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="corp" style="opacity:0">

<main class="app-page">
    <div class="page-hero">
        <div class="page-hero-l">
            <div class="page-hero-eyebrow">Rechtevergabe</div>
            <h1 class="page-hero-title">Zugriffsmatrix</h1>
            <p class="page-hero-desc">Serien­zugriff pro Benutzer verwalten. Administratoren haben automatisch Zugriff auf alle Serien — leere Zuweisung bedeutet Zugriff auf alle.</p>
        </div>
        <div class="page-hero-r">
            <button class="btn btn-primary" onclick="saveAccess()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                Zugriff speichern
            </button>
        </div>
    </div>

    <div id="matrixInfo" style="margin-bottom:14px;font-size:12px;color:var(--c-ink-4);"></div>
    <div class="access-matrix-wrap" style="background:var(--c-surface); border:1px solid var(--c-line); border-radius:14px; box-shadow:var(--el-1); overflow:hidden;">
        <div id="matrixWrap"></div>
    </div>
</main>

<script src="../../shared/js/acc-utils.js"></script>
<script src="../../shared/js/acc-storage.js"></script>
<script src="../../shared/js/acc-storage-indexeddb.js?v=3"></script>
<script src="../../shared/js/acc-storage-json.js"></script>
<script src="../../shared/js/crypto-polyfill.js"></script>
<script src="../../shared/js/acc-auth.js"></script>
<script src="../../shared/js/acc-ui.js"></script>
<script>
var currentUser = null;
var allUsers = [];
var allSeries = [];

async function init() {
    await BIM.StorageManager.init(new BIM.AutoStorageProvider());
    await BIM.Auth.init();
    currentUser = await BIM.Auth.requireAuth('../../login.html');
    if (!currentUser) return;
    if (!BIM.Auth.canAccessAdmin(currentUser)) { window.location.href = '../../index.html'; return; }
    document.body.style.opacity = '1';

    BIM.UI.installTopBar({
        crumbs: [
            { label: 'BIM Tools', href: '../../index.html' },
            { label: 'Administration', href: 'index.html' },
            { label: 'Zugriff', here: true }
        ],
        user: currentUser, loginHref: '../../login.html', brandHref: '../../index.html', subtitle: 'Administration'
    });
    BIM.UI.installAdminSubnav('access');

    allUsers = await BIM.Auth.getAllUsers();
    allSeries = await BIM.StorageManager.getAll('meetingSeries');
    renderMatrix();
}

function renderMatrix() {
    // Filter: non-admin users only (admins have full access)
    var users = allUsers.filter(function(u) { return u.role !== 'admin'; });

    if (allSeries.length === 0) {
        document.getElementById('matrixWrap').innerHTML =
            '<div style="padding:40px;text-align:center;color:var(--bim-text-muted);font-size:13px;">Keine Besprechungsserien vorhanden.</div>';
        return;
    }
    if (users.length === 0) {
        document.getElementById('matrixWrap').innerHTML =
            '<div style="padding:40px;text-align:center;color:var(--bim-text-muted);font-size:13px;">Keine Bearbeiter oder Betrachter vorhanden.</div>';
        return;
    }

    document.getElementById('matrixInfo').textContent =
        users.length + ' Benutzer × ' + allSeries.length + ' Serien';

    var html = '<table class="access-matrix"><thead><tr><th>Benutzer</th><th>Rolle</th>';
    allSeries.forEach(function(s) {
        html += '<th title="' + BIM.Utils.escapeHtml(s.title || '') + '">' + BIM.Utils.escapeHtml(s.code || s.title || '—') + '</th>';
    });
    html += '</tr></thead><tbody>';

    users.forEach(function(u) {
        var access = u.seriesAccess || [];
        var roleClass = 'role-badge role-badge-' + u.role;
        html += '<tr>';
        html += '<td><strong>' + BIM.Utils.escapeHtml(u.name || u.username) + '</strong></td>';
        html += '<td><span class="' + roleClass + '">' + BIM.Auth.getRoleLabel(u.role) + '</span></td>';
        allSeries.forEach(function(s) {
            var checked = access.length === 0 || access.indexOf(s.id) !== -1;
            html += '<td><input type="checkbox" data-user="' + u.id + '" data-series="' + s.id + '"' + (checked ? ' checked' : '') + '></td>';
        });
        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('matrixWrap').innerHTML = html;
}

async function saveAccess() {
    var users = allUsers.filter(function(u) { return u.role !== 'admin'; });
    var checkboxes = document.querySelectorAll('.access-matrix input[type="checkbox"]');

    // Build access map: userId -> [seriesIds]
    var accessMap = {};
    users.forEach(function(u) { accessMap[u.id] = []; });

    checkboxes.forEach(function(cb) {
        if (cb.checked) {
            var uid = cb.getAttribute('data-user');
            var sid = cb.getAttribute('data-series');
            if (accessMap[uid]) accessMap[uid].push(sid);
        }
    });

    // Save each user
    for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var newAccess = accessMap[u.id] || [];
        // If all series are checked, store empty array (= all access)
        if (newAccess.length === allSeries.length) newAccess = [];
        u.seriesAccess = newAccess;
        await BIM.Auth.updateUser(u);
    }

    BIM.Auth.logActivity(currentUser.id, currentUser.name, 'update', 'system', null, 'Zugriffmatrix', 'Serienzugriff aktualisiert');
    BIM.UI.success('Zugriff gespeichert');
}

init();
</script>
</body>
</html>
