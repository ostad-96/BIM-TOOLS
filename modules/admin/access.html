<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zugriff — ACC Admin</title>
<link rel="stylesheet" href="../../shared/css/acc-variables.css">
<link rel="stylesheet" href="../../shared/css/acc-base.css">
<link rel="stylesheet" href="../../shared/css/acc-components.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body style="opacity:0">

<div class="admin-layout">
    <nav class="admin-sidebar">
        <div class="admin-sidebar-header">
            <div class="admin-sidebar-logo"><img src="../../shared/assets/emch-berger-logo.gif" alt="Logo"></div>
            <div class="admin-sidebar-title">Administration</div>
            <div class="admin-sidebar-subtitle">ACC Platform</div>
        </div>
        <div class="admin-nav">
            <a class="admin-nav-item" href="index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                <span>Dashboard</span>
            </a>
            <a class="admin-nav-item" href="users.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                <span>Benutzer</span>
            </a>
            <a class="admin-nav-item" href="activity.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Aktivitäten</span>
            </a>
            <a class="admin-nav-item active" href="access.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Zugriff</span>
            </a>
        </div>
        <div class="admin-sidebar-footer">
            <a class="admin-back-link" href="../../index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="15 18 9 12 15 6"/></svg>
                Zur Startseite
            </a>
        </div>
    </nav>

    <main class="admin-main">
        <div class="admin-header">
            <div>
                <div class="admin-header-title">Zugriffmatrix</div>
                <div class="admin-header-desc">Serienzugriff pro Benutzer verwalten. Administratoren haben automatisch Zugriff auf alle Serien. Leere Zuweisung = Zugriff auf alle Serien.</div>
            </div>
        </div>

        <div class="admin-content">
            <div id="matrixInfo" style="margin-bottom:16px;font-size:12px;color:var(--acc-text-muted);"></div>
            <div class="access-matrix-wrap">
                <div id="matrixWrap"></div>
            </div>
            <div style="margin-top:16px;text-align:right;">
                <button class="acc-btn acc-btn-primary" onclick="saveAccess()">Zugriff speichern</button>
            </div>
        </div>
    </main>
</div>

<script src="../../shared/js/acc-utils.js"></script>
<script src="../../shared/js/acc-storage.js"></script>
<script src="../../shared/js/acc-storage-indexeddb.js?v=3"></script>
<script src="../../shared/js/acc-auth.js"></script>
<script src="../../shared/js/acc-ui.js"></script>
<script>
var currentUser = null;
var allUsers = [];
var allSeries = [];

async function init() {
    await ACC.StorageManager.init(new ACC.IndexedDBProvider('acc-platform'));
    await ACC.Auth.init();
    currentUser = await ACC.Auth.requireAuth('../../login.html');
    if (!currentUser) return;
    if (!ACC.Auth.canAccessAdmin(currentUser)) { window.location.href = '../../index.html'; return; }
    document.body.style.opacity = '1';

    allUsers = await ACC.Auth.getAllUsers();
    allSeries = await ACC.StorageManager.getAll('meetingSeries');
    renderMatrix();
}

function renderMatrix() {
    // Filter: non-admin users only (admins have full access)
    var users = allUsers.filter(function(u) { return u.role !== 'admin'; });

    if (allSeries.length === 0) {
        document.getElementById('matrixWrap').innerHTML =
            '<div style="padding:40px;text-align:center;color:var(--acc-text-muted);font-size:13px;">Keine Besprechungsserien vorhanden.</div>';
        return;
    }
    if (users.length === 0) {
        document.getElementById('matrixWrap').innerHTML =
            '<div style="padding:40px;text-align:center;color:var(--acc-text-muted);font-size:13px;">Keine Bearbeiter oder Betrachter vorhanden.</div>';
        return;
    }

    document.getElementById('matrixInfo').textContent =
        users.length + ' Benutzer × ' + allSeries.length + ' Serien';

    var html = '<table class="access-matrix"><thead><tr><th>Benutzer</th><th>Rolle</th>';
    allSeries.forEach(function(s) {
        html += '<th title="' + ACC.Utils.escapeHtml(s.title || '') + '">' + ACC.Utils.escapeHtml(s.code || s.title || '—') + '</th>';
    });
    html += '</tr></thead><tbody>';

    users.forEach(function(u) {
        var access = u.seriesAccess || [];
        var roleClass = 'role-badge role-badge-' + u.role;
        html += '<tr>';
        html += '<td><strong>' + ACC.Utils.escapeHtml(u.name || u.username) + '</strong></td>';
        html += '<td><span class="' + roleClass + '">' + ACC.Auth.getRoleLabel(u.role) + '</span></td>';
        allSeries.forEach(function(s) {
            var checked = access.length === 0 || access.indexOf(s.id) !== -1;
            html += '<td><input type="checkbox" data-user="' + u.id + '" data-series="' + s.id + '"' + (checked ? ' checked' : '') + '></td>';
        });
        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('matrixWrap').innerHTML = html;
}

async function saveAccess() {
    var users = allUsers.filter(function(u) { return u.role !== 'admin'; });
    var checkboxes = document.querySelectorAll('.access-matrix input[type="checkbox"]');

    // Build access map: userId -> [seriesIds]
    var accessMap = {};
    users.forEach(function(u) { accessMap[u.id] = []; });

    checkboxes.forEach(function(cb) {
        if (cb.checked) {
            var uid = cb.getAttribute('data-user');
            var sid = cb.getAttribute('data-series');
            if (accessMap[uid]) accessMap[uid].push(sid);
        }
    });

    // Save each user
    for (var i = 0; i < users.length; i++) {
        var u = users[i];
        var newAccess = accessMap[u.id] || [];
        // If all series are checked, store empty array (= all access)
        if (newAccess.length === allSeries.length) newAccess = [];
        u.seriesAccess = newAccess;
        await ACC.Auth.updateUser(u);
    }

    ACC.Auth.logActivity(currentUser.id, currentUser.name, 'update', 'system', null, 'Zugriffmatrix', 'Serienzugriff aktualisiert');
    ACC.UI.success('Zugriff gespeichert');
}

init();
</script>
</body>
</html>
