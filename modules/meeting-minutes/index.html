<style>
.mm-tweaks-toggle {
    position: fixed; right: 22px; bottom: 22px; z-index: 99;
    background: var(--c-brand); color: #fff; border: 0;
    width: 46px; height: 46px; border-radius: 50%;
    cursor: pointer; box-shadow: 0 8px 22px rgba(0, 59, 77, 0.32);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s var(--ease);
}
.mm-tweaks-toggle:hover { transform: scale(1.05); }
.mm-tweaks-toggle.hidden { display: none; }
.mm-tweaks-toggle svg { width: 20px; height: 20px; }
.mm-tweaks {
    position: fixed; right: 22px; bottom: 22px; z-index: 100;
    width: 290px; background: #fff;
    border: 1px solid var(--c-line); border-radius: 12px;
    box-shadow: var(--el-3); overflow: hidden; display: none;
}
.mm-tweaks.open { display: block; }
.mm-tweaks-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--c-brand); color: #fff;
}
.mm-tweaks-head h3 { font-size: 12px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; margin: 0; font-family: var(--f-display); }
.mm-tweaks-close { background: transparent; color: #fff; border: 0; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.mm-tweaks-close:hover { background: rgba(255,255,255,0.15); }
.mm-tweaks-body { padding: 14px; }
.mm-tweaks-section { margin-bottom: 14px; }
.mm-tweaks-section:last-child { margin-bottom: 0; }
.mm-tweaks-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-3); margin-bottom: 6px; display: flex; justify-content: space-between; }
.mm-tweaks-label .val { color: var(--c-brand); font-variant-numeric: tabular-nums; text-transform: none; letter-spacing: 0; }
.mm-tweaks-seg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: var(--c-paper-deep); padding: 3px; border-radius: 7px; }
.mm-tweaks-seg button { border: 0; background: transparent; padding: 6px 4px; border-radius: 5px; font-size: 11px; font-weight: 500; color: var(--c-ink-2); cursor: pointer; transition: background .12s var(--ease), color .12s var(--ease); }
.mm-tweaks-seg button:hover { color: var(--c-ink); }
.mm-tweaks-seg button.active { background: #fff; color: var(--c-brand); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.mm-tweaks-range { width: 100%; accent-color: var(--c-brand); }
</style>

<script>
var allSeries = [];
var seriesStats = {};
var currentUser = null;

async function init() {
    await BIM.StorageManager.init(new BIM.AutoStorageProvider());
    await BIM.Auth.init();
    currentUser = await BIM.Auth.requireAuth('../../login.html');
    if (!currentUser) return;

    // Auto-seed the demo series on first load (idempotent)
    try { if (BIM.seedDemoIfNeeded) await BIM.seedDemoIfNeeded(); } catch (_) {}
    document.body.style.opacity = '1';

    // Install corporate top bar
    BIM.UI.installTopBar({
        crumbs: [
            { label: 'BIM Tools', href: '../../index.html' },
            { label: 'Sitzungsprotokolle', here: true }
        ],
        user: currentUser,
        loginHref: '../../login.html',
        brandHref: '../../index.html'
    });

    // Hide create controls for viewers
    if (!BIM.Auth.canEdit(currentUser)) {
        var heroR = document.querySelector('.page-hero-r');
        if (heroR) heroR.style.display = 'none';
    }

    populateDropdowns();
    await loadSeries();

    document.getElementById('searchInput').addEventListener('input', BIM.Utils.debounce(renderList, 300));
    document.getElementById('filterType').addEventListener('change', renderList);
    document.getElementById('templateSelect').addEventListener('change', createFromTemplate);
}

function populateDropdowns() {
    var typeSelect = document.getElementById('filterType');
    var tplSelect = document.getElementById('templateSelect');
    var types = BIM.Utils.MEETING_TYPES;
    for (var key in types) {
        typeSelect.innerHTML += '<option value="' + key + '">' + BIM.Utils.escapeHtml(types[key]) + '</option>';
    }
    BIM.MeetingTemplates.forEach(function(tpl) {
        tplSelect.innerHTML += '<option value="' + tpl.id + '">' + BIM.Utils.escapeHtml(tpl.name) + '</option>';
    });
}

async function loadSeries() {
    allSeries = await BIM.MeetingStore.getAllSeries();
    seriesStats = {};
    for (var i = 0; i < allSeries.length; i++) {
        seriesStats[allSeries[i].id] = await BIM.MeetingStore.getSeriesStats(allSeries[i].id);
    }
    renderList();
}

function getFiltered() {
    var search = document.getElementById('searchInput').value.toLowerCase();
    var typeFilter = document.getElementById('filterType').value;
    return allSeries.filter(function(s) {
        // RBAC: filter by series access
        if (!BIM.Auth.canAccessSeries(currentUser, s.id)) return false;
        if (typeFilter && s.type !== typeFilter) return false;
        if (search) {
            var haystack = (s.title + ' ' + s.code + ' ' + s.description).toLowerCase();
            if (haystack.indexOf(search) === -1) return false;
        }
        return true;
    });
}

function renderList() {
    var wrap = document.getElementById('seriesListWrap');
    var filtered = getFiltered();
    document.getElementById('seriesCount').textContent = filtered.length + ' von ' + allSeries.length + ' Serien';

    if (filtered.length === 0) {
        if (allSeries.length === 0) {
            wrap.innerHTML = BIM.UI.renderEmptyState(
                'Keine Besprechungsserien',
                'Erstellen Sie eine neue Serie oder wählen Sie eine Vorlage.',
                'Neue Serie erstellen',
                'createNew()'
            );
        } else {
            wrap.innerHTML = BIM.UI.renderEmptyState('Keine Ergebnisse', 'Passen Sie Ihre Filterkriterien an.');
        }
        return;
    }

    var html = '<table class="tbl tbl-hover tbl-responsive">';
    html += '<thead><tr>' +
        '<th style="width:160px;">Code</th>' +
        '<th>Titel</th>' +
        '<th style="width:150px;">Typ</th>' +
        '<th style="width:90px;">Instanzen</th>' +
        '<th style="width:130px;">Letzte Sitzung</th>' +
        '<th style="width:110px;">Offen / Total</th>' +
        '<th style="width:50px;"></th>' +
        '</tr></thead><tbody>';

    filtered.forEach(function(s) {
        var stats = seriesStats[s.id] || { instanceCount: 0, openItems: 0, totalItems: 0, lastDate: null };
        html += '<tr onclick="openSeries(\'' + s.id + '\')">';
        html += '<td data-label="Code"><span class="tbl-code">' + BIM.Utils.escapeHtml(s.code || '—') + '</span></td>';
        html += '<td data-label="Titel" style="font-weight:500;">' + BIM.Utils.escapeHtml(s.title || '(ohne Titel)') + '</td>';
        html += '<td data-label="Typ">' + BIM.UI.renderTypeBadge(s.type) + '</td>';
        html += '<td data-label="Instanzen" class="tbl-num">' + stats.instanceCount + '</td>';
        html += '<td data-label="Letzte Sitzung" class="tbl-muted">' + (stats.lastDate ? BIM.Utils.formatDate(stats.lastDate) : '—') + '</td>';
        html += '<td data-label="Offen / Total" class="tbl-num">';
        if (stats.totalItems > 0) {
            html += '<span style="color:var(--c-brand); font-weight:600;">' + stats.openItems + '</span>';
            html += '<span class="tbl-muted"> / ' + stats.totalItems + '</span>';
        } else {
            html += '<span class="tbl-muted">—</span>';
        }
        html += '</td>';
        html += '<td data-label="" style="text-align:right;">';
        if (BIM.Auth.canEditSeriesSettings(currentUser)) {
            html += '<button class="icon-btn danger" onclick="event.stopPropagation(); deleteSeries(\'' + s.id + '\')" title="Löschen" aria-label="Löschen">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>' +
            '</button>';
        }
        html += '</td>';
        html += '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
}

function openSeries(id) {
    BIM.Utils.navigateTo('series-editor.html?id=' + id);
}

async function createNew() {
    var series = await BIM.MeetingStore.createSeries({ type: 'custom' });
    BIM.Utils.navigateTo('series-editor.html?id=' + series.id);
}

async function createFromTemplate() {
    var sel = document.getElementById('templateSelect');
    var tplId = sel.value;
    if (!tplId) return;
    sel.value = '';
    var series = await BIM.MeetingStore.createFromTemplate(tplId);
    BIM.Utils.navigateTo('series-editor.html?id=' + series.id);
}

async function deleteSeries(id) {
    var confirmed = await BIM.UI.confirmDelete('Möchten Sie diese Serie und alle zugehörigen Daten wirklich löschen?');
    if (!confirmed) return;
    await BIM.MeetingStore.deleteSeries(id);
    BIM.UI.success('Serie gelöscht');
    await loadSeries();
}

var MM_PRESETS = {
    sharp:  { px: 0,  input: 0,  label: 'Kantig' },
    subtle: { px: 6,  input: 4,  label: 'Subtil' },
    soft:   { px: 14, input: 8,  label: 'Soft' },
    pillow: { px: 24, input: 14, label: 'Weich' }
};
var mmTweaks = Object.assign({}, MM_TWEAK_DEFAULTS);
try { var s = localStorage.getItem('bim_mm_tweaks'); if (s) mmTweaks = Object.assign(mmTweaks, JSON.parse(s)); } catch (_) {}

function applyMmTweaks() {
    var px = mmTweaks.radiusPx, ip = mmTweaks.inputRadiusPx;
    document.querySelectorAll('.tbl').forEach(function(el) { el.style.borderRadius = px + 'px'; });
    document.querySelectorAll('.input, .select, .btn, .user-chip').forEach(function(el) { el.style.borderRadius = ip + 'px'; });
    document.querySelectorAll('.app-top-mark').forEach(function(el) { el.style.borderRadius = ip + 'px'; });
    document.querySelectorAll('.icon-btn').forEach(function(el) { el.style.borderRadius = Math.max(0, ip - 1) + 'px'; });
    document.getElementById('mmRadiusPxLabel').textContent = px + ' px';
    document.getElementById('mmInputRadiusLabel').textContent = ip + ' px';
    var p = MM_PRESETS[mmTweaks.radiusPreset];
    document.getElementById('mmRadiusValLabel').textContent = p ? p.label : 'Eigen';
    document.querySelectorAll('#mmRadiusPreset button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.preset === mmTweaks.radiusPreset);
    });
    document.getElementById('mmRadiusSlider').value = px;
    document.getElementById('mmInputRadiusSlider').value = ip;
}
function persistMmTweaks() {
    try { localStorage.setItem('bim_mm_tweaks', JSON.stringify(mmTweaks)); } catch (_) {}
    if (window.parent) window.parent.postMessage({type:'__edit_mode_set_keys', edits: mmTweaks}, '*');
}
function setMmPreset(name) {
    var p = MM_PRESETS[name]; if (!p) return;
    mmTweaks.radiusPreset = name;
    mmTweaks.radiusPx = p.px;
    mmTweaks.inputRadiusPx = p.input;
    applyMmTweaks(); persistMmTweaks();
}

(function initMmTweaks() {
    var toggle = document.getElementById('mmTweaksToggle');
    var panel  = document.getElementById('mmTweaks');
    var closeB = document.getElementById('mmTweaksClose');
    function open()  { panel.classList.add('open'); toggle.classList.add('hidden'); if (window.parent) window.parent.postMessage({type:'__edit_mode_available'}, '*'); }
    function close() { panel.classList.remove('open'); toggle.classList.remove('hidden'); if (window.parent) window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); }
    toggle.addEventListener('click', open);
    closeB.addEventListener('click', close);
    window.addEventListener('message', function(e) {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.type === '__activate_edit_mode')   open();
        if (e.data.type === '__deactivate_edit_mode') close();
    });
    if (window.parent) window.parent.postMessage({type:'__edit_mode_available'}, '*');

    document.querySelectorAll('#mmRadiusPreset button').forEach(function(b) {
        b.addEventListener('click', function() { setMmPreset(b.dataset.preset); });
    });
    document.getElementById('mmRadiusSlider').addEventListener('input', function(e) {
        mmTweaks.radiusPx = parseInt(e.target.value, 10);
        mmTweaks.radiusPreset = 'custom';
        applyMmTweaks(); persistMmTweaks();
    });
    document.getElementById('mmInputRadiusSlider').addEventListener('input', function(e) {
        mmTweaks.inputRadiusPx = parseInt(e.target.value, 10);
        mmTweaks.radiusPreset = 'custom';
        applyMmTweaks(); persistMmTweaks();
    });
})();

// Re-apply when list re-renders
var _origMmRenderList = typeof renderList === 'function' ? renderList : null;
if (_origMmRenderList) {
    renderList = function() { _origMmRenderList.apply(this, arguments); setTimeout(applyMmTweaks, 0); };
}
setTimeout(applyMmTweaks, 80);
setTimeout(applyMmTweaks, 400);
setTimeout(applyMmTweaks, 1200);

init();
</script>
