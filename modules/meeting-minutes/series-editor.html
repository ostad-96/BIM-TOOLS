<!-- ════════ Tweaks panel ════════ -->
<style>
.se-tweaks-toggle {
    position: fixed; right: 22px; bottom: 80px; z-index: 99;
    background: var(--c-brand); color: #fff; border: 0;
    width: 46px; height: 46px; border-radius: 50%;
    cursor: pointer; box-shadow: 0 8px 22px rgba(0, 59, 77, 0.32);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s var(--ease);
}
.se-tweaks-toggle:hover { transform: scale(1.05); }
.se-tweaks-toggle.hidden { display: none; }
.se-tweaks-toggle svg { width: 20px; height: 20px; }
.se-tweaks {
    position: fixed; right: 22px; bottom: 80px; z-index: 100;
    width: 290px; background: #fff;
    border: 1px solid var(--c-line); border-radius: 12px;
    box-shadow: var(--el-3); overflow: hidden; display: none;
}
.se-tweaks.open { display: block; }
.se-tweaks-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--c-brand); color: #fff;
}
.se-tweaks-head h3 { font-size: 12px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; margin: 0; font-family: var(--f-display); }
.se-tweaks-close { background: transparent; color: #fff; border: 0; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.se-tweaks-close:hover { background: rgba(255,255,255,0.15); }
.se-tweaks-body { padding: 14px; }
.se-tweaks-section { margin-bottom: 14px; }
.se-tweaks-section:last-child { margin-bottom: 0; }
.se-tweaks-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--c-ink-3); margin-bottom: 6px; display: flex; justify-content: space-between; }
.se-tweaks-label .val { color: var(--c-brand); font-variant-numeric: tabular-nums; text-transform: none; letter-spacing: 0; }
.se-tweaks-seg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; background: var(--c-paper-deep); padding: 3px; border-radius: 7px; }
.se-tweaks-seg button { border: 0; background: transparent; padding: 6px 4px; border-radius: 5px; font-size: 11px; font-weight: 500; color: var(--c-ink-2); cursor: pointer; transition: background .12s var(--ease), color .12s var(--ease); }
.se-tweaks-seg button:hover { color: var(--c-ink); }
.se-tweaks-seg button.active { background: #fff; color: var(--c-brand); font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.se-tweaks-range { width: 100%; accent-color: var(--c-brand); }
/* Always interactive, even if the page disabled inputs elsewhere */
.se-tweaks input[type="range"] { pointer-events: auto !important; }
.se-tweaks button { pointer-events: auto !important; }
</style>

<button class="se-tweaks-toggle" id="seTweaksToggle" title="Anpassen" aria-label="Tweaks öffnen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
</button>

<div class="se-tweaks" id="seTweaks">
    <div class="se-tweaks-head">
        <h3>Tweaks</h3>
        <button class="se-tweaks-close" id="seTweaksClose" aria-label="Schliessen">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <div class="se-tweaks-body">
        <div class="se-tweaks-section">
            <div class="se-tweaks-label">Ecken-Stil <span class="val" id="seRadiusValLabel">Soft</span></div>
            <div class="se-tweaks-seg" id="seRadiusPreset">
                <button data-preset="sharp">Kantig</button>
                <button data-preset="subtle">Subtil</button>
                <button data-preset="soft" class="active">Soft</button>
                <button data-preset="pillow">Weich</button>
            </div>
        </div>
        <div class="se-tweaks-section">
            <div class="se-tweaks-label">Karten-Radius <span class="val" id="seCardRadiusLabel">14 px</span></div>
            <input type="range" class="se-tweaks-range" id="seCardRadiusSlider" min="0" max="28" step="1" value="14">
        </div>
        <div class="se-tweaks-section">
            <div class="se-tweaks-label">Eingabe-Radius <span class="val" id="seInputRadiusLabel">8 px</span></div>
            <input type="range" class="se-tweaks-range" id="seInputRadiusSlider" min="0" max="24" step="1" value="8">
        </div>
    </div>
</div>

<div class="page-transition"><div class="slide"></div><div class="slide-accent"></div></div>

<div class="app-page-stub" id="stubHero" style="max-width:960px; margin:0 auto; padding:22px 24px 6px;">
    <div class="page-hero" style="margin-bottom:14px; padding-bottom:14px;">
        <div class="page-hero-l">

            <span id="autoSaveLabel" class="muted" style="font-size:12px;"></span>
            <button class="btn btn-primary" onclick="createNewInstance()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Neue Sitzung
            </button>
        </div>
    </div>
</div>

<div class="mm-tabs">
    <button class="mm-tab active" data-tab="settings" onclick="switchTab('settings')">Einstellungen</button>
    <button class="mm-tab" data-tab="instances" onclick="switchTab('instances')">Instanzen</button>
</div>

<div style="padding: 16px 24px 100px 24px; max-width: 960px; margin: 0 auto;">

    <!-- SETTINGS TAB -->
    <div class="mm-tab-panel active" id="tab-settings">

        <!-- Kopfdaten -->
        <div class="bim-card editor-section">
            <div class="editor-section-header">
                <span class="editor-section-title">Kopfdaten</span>
            </div>
            <div class="editor-section-body">
                <div class="bim-form-row">
                    <label class="bim-form-label">Seriencode</label>
                    <input type="text" id="fCode" class="bim-input" style="max-width:240px;" placeholder="z.B. B3|SSW-VE02-AP" onchange="autoSave()">
                </div>
                <div class="bim-form-row">
                    <label class="bim-form-label">Titel</label>
                    <input type="text" id="fTitle" class="bim-input" placeholder="Serienstitel eingeben..." onchange="autoSave()">
                </div>
                <div class="bim-form-row">
                    <label class="bim-form-label">Typ</label>
                    <select id="fType" class="bim-select" style="max-width:240px;" onchange="autoSave()"></select>
                </div>
                <div class="bim-form-row">
                    <label class="bim-form-label">Beschreibung</label>
                    <textarea id="fDescription" class="bim-textarea" rows="2" placeholder="Beschreibung der Besprechungsserie..." onchange="autoSave()"></textarea>
                </div>
                <div class="bim-form-row">
                    <label class="bim-form-label">Standard-Ort</label>
                    <input type="text" id="fLocation" class="bim-input" placeholder="Standard-Besprechungsort..." onchange="autoSave()">
                </div>
            </div>
        </div>

        <!-- Themenkategorien -->
        <div class="bim-card editor-section">
            <div class="editor-section-header">
                <span class="editor-section-title">Themenkategorien</span>
                <button class="bim-btn bim-btn-sm bim-btn-primary" onclick="addCategory()">+ Kategorie</button>
            </div>
            <div class="editor-section-body" id="categoriesWrap"></div>
        </div>

        <!-- Benutzerdefinierte Felder -->
        <div class="bim-card editor-section">
            <div class="editor-section-header">
                <span class="editor-section-title">Benutzerdefinierte Felder</span>
                <button class="bim-btn bim-btn-sm bim-btn-primary" onclick="addCustomField()">+ Feld</button>
            </div>
            <div class="editor-section-body" id="customFieldsWrap"></div>
        </div>

        <!-- Statusoptionen -->
        <div class="bim-card editor-section">
            <div class="editor-section-header">
                <span class="editor-section-title">Statusoptionen</span>
                <button class="bim-btn bim-btn-sm bim-btn-primary" onclick="addStatusOption()">+ Status</button>
            </div>
            <div class="editor-section-body" id="statusOptionsWrap"></div>
        </div>

        <!-- Standard-Teilnehmer -->
        <div class="bim-card editor-section">
            <div class="editor-section-header">
                <span class="editor-section-title">Standard-Teilnehmer</span>
                <button class="bim-btn bim-btn-sm bim-btn-primary" onclick="addDefaultParticipant()">+ Teilnehmer</button>
            </div>
            <div class="editor-section-body" id="defaultParticipantsWrap"></div>
        </div>
    </div>

    <!-- INSTANCES TAB -->
    <div class="mm-tab-panel" id="tab-instances">
        <div id="instancesWrap" style="margin-top:16px;"></div>
    </div>
</div>

<script>
var seriesId = BIM.Utils.getUrlParam('id');
var series = null;
var instances = [];
var autoSaveTimer = null;
var currentUser = null;

async function init() {
    await BIM.StorageManager.init(new BIM.AutoStorageProvider());
    await BIM.Auth.init();
    currentUser = await BIM.Auth.requireAuth('../../login.html');
    if (!currentUser) return;

    // ── Role-aware tab gating — applied BEFORE revealing the page,
    //    so Betrachter never sees a flash of the Einstellungen tab ──
    if (!BIM.Auth.canEditSeriesSettings(currentUser)) {
        var settingsTab = document.querySelector('[data-tab="settings"]');
        if (settingsTab) settingsTab.style.display = 'none';
        switchTab('instances');
    }

    document.body.style.opacity = '1';
    document.body.removeAttribute('data-ready');

    BIM.UI.installTopBar({
        crumbs: [
            { label: 'BIM Tools', href: '../../index.html' },
            { label: 'Sitzungsprotokolle', href: 'index.html' },
            { label: 'Serie', here: true }
        ],
        user: currentUser,
        loginHref: '../../login.html',
        brandHref: '../../index.html'
    });

    populateTypeDropdown();

    if (!seriesId) { BIM.UI.error('Keine Serien-ID angegeben'); return; }
    if (!BIM.Auth.canAccessSeries(currentUser, seriesId)) {
        BIM.UI.error('Kein Zugriff auf diese Serie');
        setTimeout(function() { window.location.href = 'index.html'; }, 1500);
        return;
    }
    series = await BIM.MeetingStore.getSeriesById(seriesId);
    if (!series) { BIM.UI.error('Serie nicht gefunden'); return; }

    // Hide save/delete buttons for editors/viewers
    if (!BIM.Auth.canEditSeriesSettings(currentUser)) {
        var footerDanger = document.querySelector('.bim-btn-danger');
        if (footerDanger) footerDanger.style.display = 'none';
        var footerSave = document.querySelector('.editor-footer .bim-btn-primary');
        if (footerSave) footerSave.style.display = 'none';
    }
    // Viewers can't create instances
    if (!BIM.Auth.canEdit(currentUser)) {
        var newBtn = document.querySelector('.bim-topbar .bim-btn-primary');
        if (newBtn) newBtn.style.display = 'none';
    }

    loadFormData();
    renderCategories();
    renderCustomFields();
    renderStatusOptions();
    renderDefaultParticipants();
    await loadInstances();
}

function populateTypeDropdown() {
    var sel = document.getElementById('fType');
    var types = BIM.Utils.MEETING_TYPES;
    for (var key in types) {
        sel.innerHTML += '<option value="' + key + '">' + BIM.Utils.escapeHtml(types[key]) + '</option>';
    }
}

function loadFormData() {
    document.getElementById('fCode').value = series.code || '';
    document.getElementById('fTitle').value = series.title || '';
    document.getElementById('fType').value = series.type || 'custom';
    document.getElementById('fDescription').value = series.description || '';
    document.getElementById('fLocation').value = series.defaultLocation || '';
    updateTopbar();
}

function updateTopbar() {
    var title = document.getElementById('fTitle').value || 'Neue Serie';
    var code = document.getElementById('fCode').value;
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('heroEyebrow').textContent = code ? 'Serie · ' + code : 'Besprechungsserie';
    // Update the "Serie" breadcrumb label with the actual series code (fallback to title)
    var here = document.querySelector('.app-crumbs .here');
    if (here) {
        here.textContent = code || title;
        here.title = title || code || '';
    }
}

function collectFields() {
    series.code = document.getElementById('fCode').value;
    series.title = document.getElementById('fTitle').value;
    series.type = document.getElementById('fType').value;
    series.description = document.getElementById('fDescription').value;
    series.defaultLocation = document.getElementById('fLocation').value;
}

function autoSave() {
    updateTopbar();
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(async function() {
        collectFields();
        await BIM.MeetingStore.updateSeries(series);
        showSaved();
    }, 1000);
}

function showSaved() {
    document.getElementById('autoSaveLabel').textContent = 'Gespeichert ' + new Date().toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
}

async function saveSeries() {
    collectFields();
    await BIM.MeetingStore.updateSeries(series);
    BIM.UI.success('Serie gespeichert');
    showSaved();
}

// ── TABS ──
function switchTab(tab) {
    document.querySelectorAll('.mm-tab').forEach(function(t) { t.classList.toggle('active', t.getAttribute('data-tab') === tab); });
    document.querySelectorAll('.mm-tab-panel').forEach(function(p) { p.classList.toggle('active', p.id === 'tab-' + tab); });
}

// ── CATEGORIES ──
function renderCategories() {
    var wrap = document.getElementById('categoriesWrap');
    var cats = series.topicCategoryDefs || [];
    if (cats.length === 0) {
        wrap.innerHTML = '<div class="bim-text-sm bim-text-muted">Keine Kategorien definiert.</div>';
        return;
    }
    cats.sort(function(a, b) { return a.sortOrder - b.sortOrder; });
    var html = '';
    cats.forEach(function(cat, i) {
        html += '<div class="config-list-item">';
        html += '<input type="text" class="bim-input bim-input-sm" style="width:60px;" value="' + BIM.Utils.escapeHtml(cat.code) + '" onchange="updateCategory(' + i + ', \'code\', this.value)">';
        html += '<input type="text" class="bim-input bim-input-sm" style="flex:1;" value="' + BIM.Utils.escapeHtml(cat.label) + '" placeholder="Kategorie-Name" onchange="updateCategory(' + i + ', \'label\', this.value)">';
        html += '<button class="bim-btn-icon bim-btn-sm" onclick="removeCategory(' + i + ')" title="Entfernen">&times;</button>';
        html += '</div>';
    });
    wrap.innerHTML = html;
}

function addCategory() {
    var cats = series.topicCategoryDefs;
    var code = String(cats.length + 1).padStart(2, '0');
    cats.push({ id: BIM.Utils.uuid(), code: code, label: '', sortOrder: cats.length + 1 });
    renderCategories();
    autoSave();
}

function updateCategory(idx, field, value) {
    series.topicCategoryDefs[idx][field] = value;
    autoSave();
}

async function removeCategory(idx) {
    var cat = series.topicCategoryDefs[idx];
    if (!cat) return;

    // Check for items in this category
    var items = await BIM.MeetingStore.getDiscussionItemsForCategory(series.id, cat.id);
    if (items.length > 0) {
        var remaining = series.topicCategoryDefs.filter(function(c, i) { return i !== idx; });
        if (remaining.length === 0) {
            BIM.UI.error('Letzte Kategorie kann nicht gelöscht werden, solange Themen existieren.');
            return;
        }
        var ok = await BIM.UI.confirm(
            'Kategorie hat Themen',
            items.length + ' Thema(en) in dieser Kategorie. Diese werden nach "' + remaining[0].label + '" verschoben. Fortfahren?'
        );
        if (!ok) return;
        for (var i = 0; i < items.length; i++) {
            await BIM.MeetingStore.moveItemToCategory(items[i].id, remaining[0].id, series.id);
        }
    }

    series.topicCategoryDefs.splice(idx, 1);
    series.topicCategoryDefs.forEach(function(c, i) { c.sortOrder = i + 1; });
    renderCategories();
    autoSave();
}

// ── CUSTOM FIELDS ──
function renderCustomFields() {
    var wrap = document.getElementById('customFieldsWrap');
    var fields = series.customFieldDefs || [];
    if (fields.length === 0) {
        wrap.innerHTML = '<div class="bim-text-sm bim-text-muted">Keine benutzerdefinierten Felder.</div>';
        return;
    }
    var html = '';
    fields.forEach(function(f, i) {
        html += '<div class="config-list-item">';
        html += '<input type="text" class="bim-input bim-input-sm" style="flex:1;" value="' + BIM.Utils.escapeHtml(f.label) + '" placeholder="Feldname" onchange="updateCustomField(' + i + ', \'label\', this.value)">';
        html += '<select class="bim-select bim-input-sm" style="width:100px;" onchange="updateCustomField(' + i + ', \'type\', this.value)">';
        ['text', 'date', 'number', 'select'].forEach(function(t) {
            html += '<option value="' + t + '"' + (f.type === t ? ' selected' : '') + '>' + t.charAt(0).toUpperCase() + t.slice(1) + '</option>';
        });
        html += '</select>';
        html += '<button class="bim-btn-icon bim-btn-sm" onclick="removeCustomField(' + i + ')" title="Entfernen">&times;</button>';
        html += '</div>';
    });
    wrap.innerHTML = html;
}

function addCustomField() {
    series.customFieldDefs.push({ id: BIM.Utils.uuid(), label: '', type: 'text', options: null });
    renderCustomFields();
    autoSave();
}

function updateCustomField(idx, field, value) {
    series.customFieldDefs[idx][field] = value;
    autoSave();
}

async function removeCustomField(idx) {
    var field = series.customFieldDefs[idx];
    var ok = await BIM.UI.confirm(
        'Feld entfernen',
        'Das Feld "' + (field && field.label || 'Unbenannt') + '" wird entfernt. Bestehende Daten in diesem Feld gehen bei allen Themen verloren. Fortfahren?'
    );
    if (!ok) return;
    var fieldId = field.id;
    series.customFieldDefs.splice(idx, 1);
    renderCustomFields();
    autoSave();

    // Clean orphaned data from all items
    var items = await BIM.MeetingStore.getDiscussionItemsForSeries(series.id);
    for (var i = 0; i < items.length; i++) {
        if (items[i].customFields && items[i].customFields[fieldId] !== undefined) {
            delete items[i].customFields[fieldId];
            await BIM.MeetingStore.updateDiscussionItem(items[i]);
        }
    }
}

// ── STATUS OPTIONS ──
function renderStatusOptions() {
    var wrap = document.getElementById('statusOptionsWrap');
    var opts = series.statusOptions || [];
    if (opts.length === 0) {
        wrap.innerHTML = '<div class="bim-text-sm bim-text-muted">Keine Statusoptionen definiert.</div>';
        return;
    }
    var html = '';
    opts.forEach(function(o, i) {
        html += '<div class="config-list-item">';
        html += '<input type="text" class="bim-input bim-input-sm" style="width:120px;" value="' + BIM.Utils.escapeHtml(o.key) + '" placeholder="Schlüssel" onchange="updateStatusOpt(' + i + ', \'key\', this.value)">';
        html += '<input type="text" class="bim-input bim-input-sm" style="flex:1;" value="' + BIM.Utils.escapeHtml(o.label) + '" placeholder="Anzeige-Name" onchange="updateStatusOpt(' + i + ', \'label\', this.value)">';
        html += '<button class="bim-btn-icon bim-btn-sm" onclick="removeStatusOpt(' + i + ')" title="Entfernen">&times;</button>';
        html += '</div>';
    });
    wrap.innerHTML = html;
}

function addStatusOption() {
    series.statusOptions.push({ key: '', label: '' });
    renderStatusOptions();
    autoSave();
}

function updateStatusOpt(idx, field, value) {
    series.statusOptions[idx][field] = value;
    autoSave();
}

function removeStatusOpt(idx) {
    series.statusOptions.splice(idx, 1);
    renderStatusOptions();
    autoSave();
}

// ── DEFAULT PARTICIPANTS ──
function renderDefaultParticipants() {
    var wrap = document.getElementById('defaultParticipantsWrap');
    var parts = series.defaultParticipants || [];
    if (parts.length === 0) {
        wrap.innerHTML = '<div class="bim-text-sm bim-text-muted">Keine Standard-Teilnehmer definiert.</div>';
        return;
    }
    var roleOptions = BIM.Utils.ATTENDEE_ROLES.map(function(r) {
        return '<option value="' + BIM.Utils.escapeHtml(r) + '">' + BIM.Utils.escapeHtml(r) + '</option>';
    }).join('');

    var html = '';
    parts.forEach(function(p, i) {
        html += '<div class="config-list-item">';
        html += '<input type="text" class="bim-input bim-input-sm" style="flex:1;" value="' + BIM.Utils.escapeHtml(p.name) + '" placeholder="Name" onchange="updateDefPart(' + i + ', \'name\', this.value)">';
        html += '<input type="text" class="bim-input bim-input-sm" style="flex:1;" value="' + BIM.Utils.escapeHtml(p.company) + '" placeholder="Firma" onchange="updateDefPart(' + i + ', \'company\', this.value)">';
        html += '<select class="bim-select bim-input-sm" style="width:160px;" onchange="updateDefPart(' + i + ', \'role\', this.value)"><option value="">Rolle...</option>' + roleOptions + '</select>';
        html += '<select class="bim-select bim-input-sm" style="width:120px;" onchange="updateDefPart(' + i + ', \'participantType\', this.value)">';
        html += '<option value="organisator"' + (p.participantType === 'organisator' ? ' selected' : '') + '>Organisator</option>';
        html += '<option value="eingeladene"' + (p.participantType === 'eingeladene' ? ' selected' : '') + '>Eingeladene</option>';
        html += '</select>';
        html += '<button class="bim-btn-icon bim-btn-sm" onclick="removeDefPart(' + i + ')" title="Entfernen">&times;</button>';
        html += '</div>';
    });
    wrap.innerHTML = html;

    parts.forEach(function(p, i) {
        var row = wrap.querySelectorAll('.config-list-item')[i];
        if (row && p.role) {
            var roleSel = row.querySelectorAll('select')[0];
            if (roleSel) roleSel.value = p.role;
        }
    });
}

function addDefaultParticipant() {
    series.defaultParticipants.push({ name: '', company: '', role: '', email: '', participantType: 'eingeladene' });
    renderDefaultParticipants();
    autoSave();
}

function updateDefPart(idx, field, value) {
    series.defaultParticipants[idx][field] = value;
    autoSave();
}

function removeDefPart(idx) {
    series.defaultParticipants.splice(idx, 1);
    renderDefaultParticipants();
    autoSave();
}

// ── INSTANCES ──
async function loadInstances() {
    instances = await BIM.MeetingStore.getInstancesForSeries(seriesId);
    renderInstances();
}

function renderInstances() {
    var wrap = document.getElementById('instancesWrap');
    if (instances.length === 0) {
        wrap.innerHTML = BIM.UI.renderEmptyState(
            'Noch keine Sitzungen',
            'Erstellen Sie die erste Sitzung dieser Serie.',
            'Neue Sitzung erstellen',
            'createNewInstance()'
        );
        return;
    }

    var html = '<table class="bim-table bim-table-hover">';
    html += '<thead><tr><th style="width:60px;">Nr.</th><th style="width:120px;">Datum</th><th>Ort</th><th style="width:100px;">Status</th><th style="width:160px;">Erstellt von</th><th style="width:60px;"></th></tr></thead><tbody>';

    instances.forEach(function(inst) {
        html += '<tr onclick="openInstance(\'' + inst.id + '\')">';
        html += '<td><strong>' + inst.instanceNumber + '</strong></td>';
        html += '<td>' + BIM.Utils.formatDate(inst.date) + '</td>';
        html += '<td>' + BIM.Utils.escapeHtml(inst.location || '—') + '</td>';
        html += '<td>' + BIM.UI.renderInstanceStatusBadge(inst.status) + '</td>';
        html += '<td class="bim-text-xs bim-text-muted">' + BIM.Utils.escapeHtml(inst.createdBy || '—') + '</td>';
        html += '<td style="text-align:right;">';
        html += '<button class="bim-btn-icon bim-btn-sm" onclick="event.stopPropagation(); deleteInstance(\'' + inst.id + '\')" title="Löschen">&times;</button>';
        html += '</td></tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
}

function openInstance(id) {
    BIM.Utils.navigateTo('instance-editor.html?seriesId=' + seriesId + '&instanceId=' + id);
}

async function createNewInstance() {
    var instance = await BIM.MeetingStore.createInstance(seriesId, {});
    BIM.UI.success('Sitzung #' + instance.instanceNumber + ' erstellt');
    BIM.Utils.navigateTo('instance-editor.html?seriesId=' + seriesId + '&instanceId=' + instance.id);
}

async function deleteInstance(id) {
    var confirmed = await BIM.UI.confirmDelete('Möchten Sie diese Sitzung wirklich löschen?');
    if (!confirmed) return;
    await BIM.MeetingStore.deleteInstance(id);
    BIM.UI.success('Sitzung gelöscht');
    await loadInstances();
}

// ── NAV ──
function goBack() { BIM.Utils.navigateTo('index.html'); }

async function deleteSeries() {
    var confirmed = await BIM.UI.confirmDelete('Möchten Sie diese Serie und alle zugehörigen Daten wirklich löschen?');
    if (!confirmed) return;
    await BIM.MeetingStore.deleteSeries(seriesId);
    BIM.UI.success('Serie gelöscht');
    BIM.Utils.navigateTo('index.html');
}

}/*EDITMODE-END*/;
var SE_PRESETS = {
    sharp:  { card: 0,  input: 0,  label: 'Kantig' },
    subtle: { card: 6,  input: 4,  label: 'Subtil' },
    soft:   { card: 14, input: 8,  label: 'Soft' },
    pillow: { card: 24, input: 14, label: 'Weich' }
};
var seTweaks = Object.assign({}, SE_TWEAK_DEFAULTS);
try { var s = localStorage.getItem('bim_se_tweaks'); if (s) seTweaks = Object.assign(seTweaks, JSON.parse(s)); } catch (_) {}

function applySeTweaks() {
    var c = seTweaks.cardRadiusPx, ip = seTweaks.inputRadiusPx;
    document.querySelectorAll('.bim-card, .editor-section').forEach(function(el) { el.style.borderRadius = c + 'px'; });
    document.querySelectorAll('.bim-input, .bim-select, .bim-textarea, .input, .select, .textarea, .bim-btn, .btn').forEach(function(el) { el.style.borderRadius = ip + 'px'; });
    document.querySelectorAll('.bim-btn-icon, .icon-btn').forEach(function(el) { el.style.borderRadius = Math.max(0, ip - 1) + 'px'; });
    document.querySelectorAll('.user-chip').forEach(function(el) { el.style.borderRadius = ip + 'px'; });
    document.querySelectorAll('.app-top-mark').forEach(function(el) { el.style.borderRadius = ip + 'px'; });
    document.querySelectorAll('.category-row, .custom-field-row, .participant-row, .status-option-row, .tbl, .bim-table').forEach(function(el) { el.style.borderRadius = c + 'px'; });
    // Instanzen table: target the table wrap and clip with overflow:hidden so corners actually round
    document.querySelectorAll('#instancesWrap .bim-table, #instancesWrap > .bim-card').forEach(function(el) {
        el.style.borderRadius = c + 'px';
        el.style.overflow = 'hidden';
    });
    document.getElementById('seCardRadiusLabel').textContent = c + ' px';
    document.getElementById('seInputRadiusLabel').textContent = ip + ' px';
    var p = SE_PRESETS[seTweaks.radiusPreset];
    document.getElementById('seRadiusValLabel').textContent = p ? p.label : 'Eigen';
    document.querySelectorAll('#seRadiusPreset button').forEach(function(b) {
        b.classList.toggle('active', b.dataset.preset === seTweaks.radiusPreset);
    });
    document.getElementById('seCardRadiusSlider').value = c;
    document.getElementById('seInputRadiusSlider').value = ip;
}
function persistSeTweaks() {
    try { localStorage.setItem('bim_se_tweaks', JSON.stringify(seTweaks)); } catch (_) {}
    if (window.parent) window.parent.postMessage({type:'__edit_mode_set_keys', edits: seTweaks}, '*');
}
function setSePreset(name) {
    var p = SE_PRESETS[name]; if (!p) return;
    seTweaks.radiusPreset = name;
    seTweaks.cardRadiusPx = p.card;
    seTweaks.inputRadiusPx = p.input;
    applySeTweaks(); persistSeTweaks();
}

(function initSeTweaks() {
    var toggle = document.getElementById('seTweaksToggle');
    var panel  = document.getElementById('seTweaks');
    var closeB = document.getElementById('seTweaksClose');
    function open()  { panel.classList.add('open'); toggle.classList.add('hidden'); if (window.parent) window.parent.postMessage({type:'__edit_mode_available'}, '*'); }
    function close() { panel.classList.remove('open'); toggle.classList.remove('hidden'); if (window.parent) window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); }
    toggle.addEventListener('click', open);
    closeB.addEventListener('click', close);
    window.addEventListener('message', function(e) {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.type === '__activate_edit_mode')   open();
        if (e.data.type === '__deactivate_edit_mode') close();
    });
    if (window.parent) window.parent.postMessage({type:'__edit_mode_available'}, '*');

    document.querySelectorAll('#seRadiusPreset button').forEach(function(b) {
        b.addEventListener('click', function() { setSePreset(b.dataset.preset); });
    });
    document.getElementById('seCardRadiusSlider').addEventListener('input', function(e) {
        seTweaks.cardRadiusPx = parseInt(e.target.value, 10);
        seTweaks.radiusPreset = 'custom';
        applySeTweaks(); persistSeTweaks();
    });
    document.getElementById('seInputRadiusSlider').addEventListener('input', function(e) {
        seTweaks.inputRadiusPx = parseInt(e.target.value, 10);
        seTweaks.radiusPreset = 'custom';
        applySeTweaks(); persistSeTweaks();
    });
})();

// Re-apply tweaks after dynamic renders (categories, fields, participants…)
// Throttled, ignores attribute mutations to avoid feedback loop (applyTweaks sets inline styles).
var _seScheduled = false;
function _seSchedule() {
    if (_seScheduled) return;
    _seScheduled = true;
    requestAnimationFrame(function() { _seScheduled = false; applySeTweaks(); });
}
var _seMo = new MutationObserver(function(muts) {
    for (var i = 0; i < muts.length; i++) {
        if (muts[i].type === 'childList' && (muts[i].addedNodes.length || muts[i].removedNodes.length)) {
            _seSchedule();
            return;
        }
    }
});
setTimeout(function() {
    _seMo.observe(document.body, { childList: true, subtree: true });
    applySeTweaks();
}, 120);

init();
</script>
