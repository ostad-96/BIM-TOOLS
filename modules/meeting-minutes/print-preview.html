<style>
/* ── Floating Tweaks panel ── */
.tweaks-floating {
    position: fixed; right: 22px; bottom: 22px; z-index: 100;
    width: 280px;
    background: #ffffff;
    color: #1c2024;
    border: 1px solid #d8dcde;
    border-radius: 10px;
    box-shadow: 0 12px 28px rgba(15, 28, 38, 0.18), 0 2px 4px rgba(15, 28, 38, 0.08);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
    display: none;
}
.tweaks-floating.open { display: block; }
.tweaks-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: #003B4D; color: #fff;
}
.tweaks-head h3 { font-size: 12px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; margin: 0; }
.tweaks-close {
    background: transparent; color: #fff; border: 0;
    width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.tweaks-close:hover { background: rgba(255,255,255,0.15); }
.tweaks-body { padding: 14px; }
.tweaks-section { margin-bottom: 16px; }
.tweaks-section:last-child { margin-bottom: 0; }
.tweaks-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: #57606a;
    margin-bottom: 6px;
}
.tweaks-segmented {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
    background: #f0f3f4; padding: 3px; border-radius: 6px;
}
.tweaks-seg {
    border: 0; background: transparent;
    padding: 6px 4px; border-radius: 4px;
    font-size: 11px; font-weight: 500; color: #4a5057; cursor: pointer;
    transition: background .12s ease, color .12s ease;
}
.tweaks-seg:hover { color: #1c2024; }
.tweaks-seg.active { background: #fff; color: #003B4D; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
.tweaks-swatches { display: flex; gap: 6px; }
.tweaks-swatch {
    width: 32px; height: 32px;
    border: 2px solid transparent;
    border-radius: 7px; cursor: pointer;
    position: relative;
    transition: transform .12s ease;
}
.tweaks-swatch:hover { transform: scale(1.07); }
.tweaks-swatch.active { border-color: #1c2024; box-shadow: 0 0 0 2px #fff inset; }
.tweaks-logo-row { display: flex; align-items: center; gap: 8px; }
.tweaks-logo-preview {
    width: 88px; height: 38px;
    border: 1px dashed #c0c5ce; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
}
.tweaks-logo-preview img { max-width: 100%; max-height: 100%; }
.tweaks-logo-btn {
    flex: 1; padding: 7px 10px;
    background: #f0f3f4; border: 1px solid #d8dcde; border-radius: 5px;
    font-size: 11px; font-weight: 500; color: #1c2024; cursor: pointer;
    text-align: center;
}
.tweaks-logo-btn:hover { background: #e7eaed; }
.tweaks-logo-reset {
    background: transparent; border: 0; color: #7a8085;
    font-size: 10px; cursor: pointer; padding: 4px;
}
.tweaks-logo-reset:hover { color: #1c2024; text-decoration: underline; }

.tweaks-toggle {
    position: fixed; right: 22px; bottom: 22px; z-index: 99;
    background: #003B4D; color: #fff; border: 0;
    width: 48px; height: 48px; border-radius: 50%;
    cursor: pointer; box-shadow: 0 8px 22px rgba(0, 59, 77, 0.32);
    display: flex; align-items: center; justify-content: center;
    transition: transform .12s ease;
}
.tweaks-toggle:hover { transform: scale(1.05); }
.tweaks-toggle.hidden { display: none; }
.tweaks-toggle svg { width: 20px; height: 20px; }

/* ── Loading state ── */
.loading-state {
    text-align: center; padding: 80px 20px; color: #6b7280;
    font-size: 13px;
}
</style>
</head>

        <h3>Tweaks</h3>

        <div class="tweaks-section">

                <button class="tweaks-swatch"        data-val="#243b1f" style="background:#243b1f" title="Waldgrün"></button>

        <div class="tweaks-section">
            <div class="tweaks-label">Firmenlogo (für diese Serie)</div>

                    <img id="logoPreviewImg" src="../../shared/assets/emch-berger-logo.gif" alt="Logo">
                </div>
                <button class="tweaks-logo-btn" id="logoUploadBtn">Logo hochladen</button>

            <button class="tweaks-logo-reset" id="logoReset" style="margin-top:6px;">Auf Standard zurücksetzen</button>
            <input type="file" id="logoFileInput" accept="image/*,image/svg+xml" style="display:none">
        </div>
    </div>
</div>

var state = Object.assign({}, TWEAK_DEFAULTS);
var data = BIM.PrintSampleData;

// ── URL params: ?seriesId=...&instanceId=...&template=acc|klassisch|sidebar ──
var _qs = new URLSearchParams(window.location.search);
var _urlSeriesId   = _qs.get('seriesId');
var _urlInstanceId = _qs.get('instanceId');
var _urlTemplate   = _qs.get('template');

// Page content height: A4 (297mm) minus padding (≈32-38mm) minus header/footer ≈ varies per template
var PAGE_CONTENT_HEIGHT = {
    acc:       940,
    klassisch: 905,
    sidebar:   920
};

// ════════ Boot ════════
document.addEventListener('DOMContentLoaded', async function() {
    // Template from URL overrides everything else (so we land on the user's pick)
    if (_urlTemplate && PAGE_CONTENT_HEIGHT[_urlTemplate]) state.template = _urlTemplate;

    // If seriesId+instanceId were passed, load the live data from the store and
    // reshape it into the form the renderers expect. Sample data is the fallback.
    if (_urlSeriesId && _urlInstanceId) {
        try {
            await BIM.StorageManager.init(new BIM.AutoStorageProvider());
            var loaded = await loadInstanceForPrint(_urlSeriesId, _urlInstanceId);
            if (loaded) data = loaded;
        } catch (e) { console.warn('Falling back to sample data:', e); }
    }

    document.getElementById('docTitle').textContent =
        'Besprechung ' + data.instance.number + ' · ' + data.series.code;
    initToolbar();
    initTweaks();
    render();
});

// ── Live→print data adapter ──
async function loadInstanceForPrint(seriesId, instanceId) {
    var full = await BIM.MeetingStore.getInstanceFull(instanceId);
    if (!full || !full.series || !full.instance) return null;
    var s = full.series, inst = full.instance;

    // Field-def lookup so customFields[id] → label
    var fieldDefs = (s.customFieldDefs || []).reduce(function(acc, f) { acc[f.id] = f.label; return acc; }, {});
    // Category-def lookup
    var catByCode = {}; var catById = {};
    (s.topicCategoryDefs || []).forEach(function(c) { catByCode[c.code] = c; catById[c.id] = c; });
    var orderedCats = (s.topicCategoryDefs || []).slice().sort(function(a, b) { return (a.sortOrder||0) - (b.sortOrder||0); })
        .map(function(c) { return { code: c.code, label: c.label }; });

    var orgs = (full.participants || []).filter(function(p) { return p.participantType === 'organisator'; })
        .map(function(p) { return { name: p.name || p.role || '', company: p.company || '', present: p.present !== false }; });
    var ein = (full.participants || []).filter(function(p) { return p.participantType !== 'organisator'; })
        .map(function(p) { return { name: p.name || p.role || '', company: p.company || '', present: p.present !== false }; });

    // Group updates per discussionItem and date-sort
    var updsByItem = {};
    (full.updates || []).forEach(function(u) {
        (updsByItem[u.discussionItemId] = updsByItem[u.discussionItemId] || []).push(u);
    });
    Object.keys(updsByItem).forEach(function(k) {
        updsByItem[k].sort(function(a, b) { return (a.date || '') < (b.date || '') ? -1 : 1; });
    });

    // Attachments per item
    var attByItem = {};
    (full.attachments || []).forEach(function(a) {
        (attByItem[a.discussionItemId] = attByItem[a.discussionItemId] || []).push(a.fileName);
    });

    // Instance-scoped filtering: same logic as meeting-view.html
    var _instanceId = full.instance.id;
    var filteredItems = (full.discussionItems || []).filter(function(item) {
        if (item.createdByInstanceId === _instanceId) return true;
        var hasUpdates = (updsByItem[item.id] || []).some(function(u) { return u.instanceId === _instanceId; });
        if (hasUpdates) return true;
        if (item.status === 'offen' || item.status === 'laufend') return true;
        return false;
    });

    var items = filteredItems.slice().sort(function(a, b) {
        var ca = (catById[a.categoryId] || {}).sortOrder || 0;
        var cb = (catById[b.categoryId] || {}).sortOrder || 0;
        if (ca !== cb) return ca - cb;
        return (a.itemNumber||0) - (b.itemNumber||0);
    }).map(function(it) {
        var cat = catById[it.categoryId];
        var fields = [];
        Object.keys(it.customFields || {}).forEach(function(fid) {
            var v = it.customFields[fid];
            if (v != null && v !== '') fields.push([fieldDefs[fid] || fid, v]);
        });
        return {
            cat: cat ? cat.code : '—',
            n: it.itemNumber,
            title: it.title || '(ohne Titel)',
            desc: it.description || '',
            fields: fields,
            status: it.status || 'offen',
            due: it.dueDate ? formatDDMMYYYY(it.dueDate) : '',
            assignees: it.assignees || [],
            attachments: attByItem[it.id] || [],
            createdAt: it.createdAt ? formatDDMMYYYY(it.createdAt) : '',
            createdBy: it.createdBy || '',
            updatedAt: it.updatedAt ? formatDDMMYYYY(it.updatedAt) : '',
            updatedBy: it.updatedBy || it.createdBy || '',
            updates: (updsByItem[it.id] || []).map(function(u) {
                return { date: formatDDMMYY(u.date), text: u.text || '' };
            })
        };
    });

    return {
        company: BIM.PrintSampleData.company,   // re-use defaults from sample (logo placeholder, address)
        project: { code: s.code || '', title: s.title || '', number: '' },
        series:  { code: s.code || '', title: s.title || '', type: s.type, description: s.description || '' },
        instance: {
            number: inst.instanceNumber,
            date: inst.date,
            timeStart: inst.timeStart || '',
            timeEnd: inst.timeEnd || '',
            location: inst.location || '',
            createdBy: inst.createdBy || '',
            createdAt: inst.createdAt || '',
            author: inst.createdBy || '',
            verteiler: ''
        },
        participants: { organisatoren: orgs, eingeladene: ein },
        categories: orderedCats,
        items: items
    };
}
function formatDDMMYYYY(iso) {
    if (!iso) return '';
    var d = new Date(iso); if (isNaN(d.getTime())) return iso;
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}
function formatDDMMYY(iso) {
    if (!iso) return '';
    var d = new Date(iso); if (isNaN(d.getTime())) return iso;
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getFullYear()).slice(-2);
}

function initToolbar() {
    document.querySelectorAll('.pt-template-pill').forEach(function(btn) {
        btn.addEventListener('click', function() {
            state.template = btn.dataset.tpl;
            persist();
            render();
        });
    });
}

function initTweaks() {
    var toggle = document.getElementById('tweaksToggle');
    var panel = document.getElementById('tweaksPanel');
    var closeBtn = document.getElementById('tweaksClose');

    function open()  { panel.classList.add('open');  toggle.classList.add('hidden');
                       window.parent && window.parent.postMessage({type:'__edit_mode_available'}, '*'); }
    function close() { panel.classList.remove('open'); toggle.classList.remove('hidden');
                       window.parent && window.parent.postMessage({type:'__edit_mode_dismissed'}, '*'); }

    toggle.addEventListener('click', open);
    closeBtn.addEventListener('click', close);

    // External host integration (Tweaks toolbar)
    window.addEventListener('message', function(e) {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.type === '__activate_edit_mode')   open();
        if (e.data.type === '__deactivate_edit_mode') close();
    });
    window.parent && window.parent.postMessage({type:'__edit_mode_available'}, '*');

    // Template segmented
    document.querySelectorAll('#tweakTemplate .tweaks-seg').forEach(function(b) {
        b.addEventListener('click', function() {
            state.template = b.dataset.val;
            persist();
            render();
        });
    });

    // Accent swatches
    document.querySelectorAll('#tweakAccent .tweaks-swatch').forEach(function(b) {
        b.addEventListener('click', function() {
            state.accent = b.dataset.val;
            persist();
            render();
        });
    });

    // Logo upload
    var fileInput = document.getElementById('logoFileInput');
    document.getElementById('logoUploadBtn').addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function(e) {
        var f = e.target.files && e.target.files[0];
        if (!f) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
            state.logoDataUrl = ev.target.result;
            persist();
            render();
        };
        reader.readAsDataURL(f);
    });
    document.getElementById('logoReset').addEventListener('click', function() {
        state.logoDataUrl = '';
        persist();
        render();
    });
}

function persist() {
    try { localStorage.setItem('bim_print_tweaks', JSON.stringify(state)); } catch(_) {}
    syncTweakUI();
    // For tweak persistence to disk via host (if running in editor)
    window.parent && window.parent.postMessage({type:'__edit_mode_set_keys', edits: state}, '*');
}

function syncTweakUI() {
    // Toolbar pills
    document.querySelectorAll('.pt-template-pill').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tpl === state.template);
    });
    document.querySelectorAll('#tweakTemplate .tweaks-seg').forEach(function(b) {
        b.classList.toggle('active', b.dataset.val === state.template);
    });
    document.querySelectorAll('#tweakAccent .tweaks-swatch').forEach(function(b) {
        b.classList.toggle('active', b.dataset.val === state.accent);
    });
    document.getElementById('logoPreviewImg').src = state.logoDataUrl || data.company.logo;
}

// Restore from localStorage if available
try {
    var saved = localStorage.getItem('bim_print_tweaks');
    if (saved) state = Object.assign(state, JSON.parse(saved));
    // Migrate legacy 'technisch' choice to new 'sidebar' template
    if (state.template === 'technisch') state.template = 'sidebar';
} catch(_) {}

// ════════ Render ════════
function render() {
    // Body class for template style
    document.body.className = 'tpl-' + state.template;
    // Accent CSS variable
    document.documentElement.style.setProperty('--pt-accent', state.accent);
    var accentSoft = hexToRgba(state.accent, 0.08);
    var accentLine = hexToRgba(state.accent, 0.55);
    document.documentElement.style.setProperty('--pt-accent-soft', accentSoft);
    document.documentElement.style.setProperty('--pt-accent-line', accentLine);

    syncTweakUI();

    var logo = state.logoDataUrl || data.company.logo;
    var renderer = BIM.PrintRenderers[state.template];
    if (!renderer) return;

    var blocks = renderer(data, { logo: logo });

    // Measure each block
    var measure = document.getElementById('measureContainer');
    measure.innerHTML = '';
    var blockEls = blocks.map(function(html) {
        var div = document.createElement('div');
        div.className = 'pt-block';
        div.innerHTML = html;
        measure.appendChild(div);
        return div;
    });

    // Wait for images then paginate
    var imgs = measure.querySelectorAll('img');
    var pending = [];
    for (var i = 0; i < imgs.length; i++) {
        if (!imgs[i].complete) {
            pending.push(new Promise(function(resolve) {
                imgs[i].addEventListener('load', resolve);
                imgs[i].addEventListener('error', resolve);
            }));
        }
    }
    Promise.all(pending).then(function() {
        paginate(blockEls, logo);
    });
}

function paginate(blockEls, logo) {
    var maxH = PAGE_CONTENT_HEIGHT[state.template] || 920;
    var pages = [];
    var current = [];
    var height = 0;

    blockEls.forEach(function(el) {
        var h = el.offsetHeight + 2;
        if (h > maxH) {
            // Single block is taller than a full page — accept overflow.
            if (current.length) { pages.push(current); current = []; height = 0; }
            pages.push([el]);
            return;
        }
        if (height + h > maxH && current.length > 0) {
            pages.push(current);
            current = [];
            height = 0;
        }
        current.push(el);
        height += h;
    });
    if (current.length) pages.push(current);

    // Build output
    var out = document.getElementById('pagesOutput');
    out.innerHTML = '';
    var total = pages.length;
    var footerAuthor = data.instance.author;
    var footerTime = formatGenerated();

    pages.forEach(function(page, idx) {
        var pageEl = document.createElement('div');
        pageEl.className = 'pt-page';
        var isFirst = idx === 0;
        pageEl.appendChild(buildHeader(isFirst, logo));
        var content = document.createElement('div');
        content.className = 'pt-page-content';
        page.forEach(function(b) {
            // Move (not clone) so block keeps measurements
            content.appendChild(b);
        });
        pageEl.appendChild(content);
        pageEl.appendChild(buildFooter(idx + 1, total, footerAuthor, footerTime));
        out.appendChild(pageEl);
    });
}

function buildHeader(isFirst, logo) {
    var h = document.createElement('div');
    h.className = 'pt-page-header';
    if (state.template === 'acc') {
        // First page uses cover-header block as in-page; following pages get a compact header.
        if (isFirst) {
            h.style.display = 'none';
            return h;
        }
        h.innerHTML =
            '<span class="ph-l">' + escapeHtml(data.project.code) + '</span>' +
            '<span class="ph-r">' + escapeHtml(data.series.code) + '<span class="sep">·</span>' + escapeHtml(data.series.title) + '</span>';
    } else if (state.template === 'klassisch') {
        h.innerHTML =
            '<div class="ph-l"><strong>' + escapeHtml(data.project.code) + '</strong> · ' + escapeHtml(data.series.title) + '</div>' +
            '<div class="ph-r"><span>Protokoll Nr. ' + escapeHtml(data.instance.number) + '</span><img src="' + escapeHtml(logo) + '" alt=""></div>';
    } else if (state.template === 'sidebar') {
        h.innerHTML =
            '<span class="ph-l">' + escapeHtml(data.project.code) + ' · ' + escapeHtml(data.series.code) + '</span>' +
            '<span class="ph-r"><span>Protokoll Nr. ' + escapeHtml(data.instance.number) + '</span><span class="sep">·</span><img src="' + escapeHtml(logo) + '" alt=""></span>';
    } else { // technisch (legacy fallback)
        h.innerHTML =
            '<div class="ph-bar"><span>' + escapeHtml(data.project.code) + '</span><span class="sep">/</span>' +
                '<span>' + escapeHtml(data.series.code) + '</span><span class="sep">/</span>' +
                '<span>PROTOKOLL #' + escapeHtml(data.instance.number) + '</span></div>' +
            '<div class="ph-l">' + escapeHtml(data.project.number) + '</div>' +
            '<div class="ph-c">' + escapeHtml(data.series.title) + '</div>' +
            '<div class="ph-r"><img src="' + escapeHtml(logo) + '" alt=""></div>';
    }
    return h;
}

function buildFooter(pageNum, total, author, generated) {
    var f = document.createElement('div');
    f.className = 'pt-page-footer';
    if (state.template === 'acc') {
        f.innerHTML =
            '<span>Erstellt von ' + escapeHtml(author) + ' mit BIM Tools am ' + escapeHtml(generated) + '</span>' +
            '<span>Seite ' + pageNum + ' von ' + total + '</span>';
    } else if (state.template === 'klassisch') {
        f.innerHTML =
            '<span class="pf-l">' + escapeHtml(data.company.name) + ' · ' + escapeHtml(data.company.address) + '</span>' +
            '<span class="pf-c">Verfasst von ' + escapeHtml(author) + '</span>' +
            '<span class="pf-r">Seite ' + pageNum + ' / ' + total + ' · ' + escapeHtml(generated) + '</span>';
    } else if (state.template === 'sidebar') {
        f.innerHTML =
            '<span class="pf-l">Verfasst von ' + escapeHtml(author) + '</span>' +
            '<span class="pf-c">' + escapeHtml(data.company.name) + '</span>' +
            '<span class="pf-r">Seite ' + pageNum + ' / ' + total + ' · ' + escapeHtml(generated) + '</span>';
    } else { // technisch
        f.innerHTML =
            '<span class="pf-l"><strong>VERFASSER</strong> ' + escapeHtml(author) + '</span>' +
            '<span class="pf-c"><strong>GENERIERT</strong> ' + escapeHtml(generated) + '</span>' +
            '<span class="pf-r"><strong>SEITE</strong> ' + pageNum + ' / ' + total + '</span>';
    }
    return f;
}

function formatGenerated() {
    var d = new Date();
    var pad = function(n) { return String(n).padStart(2,'0'); };
    return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear() + ' · ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function hexToRgba(hex, a) {
    var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '');
    if (!m) return 'rgba(0,59,77,' + a + ')';
    return 'rgba(' + parseInt(m[1],16) + ',' + parseInt(m[2],16) + ',' + parseInt(m[3],16) + ',' + a + ')';
}

// Re-paginate on window resize (small delay)
var _resizeTimer;
window.addEventListener('resize', function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(render, 250);
});
</script>
</body>
